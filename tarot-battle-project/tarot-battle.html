<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗对决 - 桌游原型 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(160deg,#0d0d1a 0%,#1a1025 30%,#0d1520 70%,#0a0a14 100%);
  min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;
  color:#d4c8b8;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(120,80,200,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(200,150,50,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(80,120,200,0.05) 0%,transparent 60%);
}
#app{max-width:1400px;margin:0 auto;padding:8px 12px;}

#top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(20,15,30,0.85);
  border:1px solid rgba(180,160,200,0.2);border-radius:12px;
  margin-bottom:8px;backdrop-filter:blur(10px);
}
#round-info{font-size:18px;font-weight:bold;color:#e8d5a0;}
#round-info span{color:#c8a860;font-size:24px;}
#phase-info{
  padding:4px 16px;border-radius:20px;font-size:14px;font-weight:bold;transition:all 0.3s;
}
.phase-a{background:rgba(100,180,255,0.2);color:#8cc8ff;border:1px solid rgba(100,180,255,0.3);}
.phase-b{background:rgba(255,140,100,0.2);color:#ffaa88;border:1px solid rgba(255,140,100,0.3);}
#deck-info{display:flex;gap:12px;font-size:13px;color:#aaa;}
.deck-count{padding:2px 10px;border-radius:6px;background:rgba(0,0,0,0.3);}
.deck-count.minor{border:1px solid rgba(150,150,200,0.3);}
.deck-count.major{border:1px solid rgba(255,215,0,0.3);color:#e8d5a0;}

#log-area{
  margin-top:6px;padding:4px 12px;background:rgba(0,0,0,0.4);border-radius:8px;
  font-size:12px;color:#aaa;max-height:48px;overflow-y:auto;min-height:24px;
}

#battlefield{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:10px;
}
.battle-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.battle-row-label{
  font-size:11px;text-align:center;padding:2px 0;letter-spacing:2px;
  font-weight:bold;user-select:none;
}
.battle-row-label.enemy{color:rgba(255,130,100,0.55);}
.battle-row-label.friendly{color:rgba(100,180,255,0.55);}
.element-zone{
  background:rgba(15,10,25,0.85);border:2px solid rgba(100,80,160,0.3);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  transition:all 0.3s;min-height:155px;
}
.element-zone.highlight{border-color:rgba(255,215,0,0.8);box-shadow:0 0 20px rgba(255,215,0,0.15);}
.element-zone.selectable{cursor:pointer;}
.element-zone.selectable.friendly{border-color:rgba(100,180,255,0.55);box-shadow:0 0 12px rgba(100,180,255,0.12);}
.element-zone.selectable.friendly:hover{border-color:rgba(100,200,255,1);box-shadow:0 0 22px rgba(100,200,255,0.35);transform:translateY(-2px);}
.element-zone.selectable.enemy{border-color:rgba(255,140,100,0.45);box-shadow:0 0 10px rgba(255,140,100,0.08);}
.element-zone.selectable.enemy:hover{border-color:rgba(255,150,110,0.9);box-shadow:0 0 20px rgba(255,140,100,0.3);transform:translateY(-2px);}
.element-zone.selected-zone{border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.3);}

.element-header{
  text-align:center;padding:6px 8px;font-weight:bold;font-size:14px;
  letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px;
}
.element-header .icon{font-size:20px;}
.elem-wands .element-header{background:rgba(200,80,40,0.25);color:#e8946a;}
.elem-cups .element-header{background:rgba(60,140,200,0.25);color:#8ab8e0;}
.elem-swords .element-header{background:rgba(180,180,100,0.25);color:#d8d8a0;}
.elem-pentacles .element-header{background:rgba(80,160,80,0.25);color:#90c890;}

.player-zone{
  flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:4px;min-height:80px;
}
.player-label{
  font-size:11px;color:rgba(255,255,255,0.5);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.player-label .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.player-label .dot.a{background:#6ab8ff;}
.player-label .dot.b{background:#ff8866;}
.score-display{text-align:center;padding:4px 0;font-weight:bold;}
.score-display .score-num{font-size:20px;color:#e8d5a0;}
.score-display .score-label{font-size:10px;color:#888;}
.score-display .score-effects{font-size:10px;color:#c8a860;margin-top:2px;}

.card-mini{
  display:inline-flex;align-items:center;gap:3px;padding:2px 6px;
  border-radius:6px;font-size:11px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);margin:1px 2px;
  transition:all 0.2s;
}
.card-mini.court{border-color:rgba(255,200,100,0.5);background:rgba(255,200,100,0.12);color:#ffcc88;}
.cards-row{display:flex;flex-wrap:wrap;gap:2px;min-height:22px;}
.cards-row.card-mode{gap:5px;min-height:42px;align-content:flex-start;}

/* 塔罗卡牌 - 常规卡牌样式 */
.tarot-card{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:space-between;
  width:58px;height:78px;padding:4px 3px 5px;
  border-radius:8px;margin:1px;
  background:linear-gradient(165deg,rgba(35,28,50,0.96) 0%,rgba(18,12,32,0.96) 100%);
  border:2px solid rgba(170,155,200,0.35);
  box-shadow:2px 3px 8px rgba(0,0,0,0.4);
  transition:all 0.2s;cursor:default;position:relative;overflow:hidden;
  user-select:none;
}
.tarot-card::before{
  content:'';position:absolute;top:2px;left:2px;right:2px;bottom:2px;
  border-radius:5px;border:1px solid rgba(255,255,255,0.05);pointer-events:none;
}
.tarot-card:hover{
  transform:translateY(-4px) scale(1.06);
  box-shadow:3px 8px 18px rgba(0,0,0,0.55);
  border-color:rgba(255,215,0,0.55);z-index:3;
}
.tarot-card .card-top{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:0 2px;
}
.tarot-card .card-val{font-size:15px;font-weight:bold;color:#e8d5a0;line-height:1;}
.tarot-card .card-suit-icon{font-size:26px;line-height:1;margin:0;flex-shrink:0;}
.tarot-card .card-name{
  font-size:9px;color:rgba(255,255,255,0.6);text-align:center;
  width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.2;padding-top:2px;
}
/* 数字牌花色色调 */
.tarot-card.suit-wands .card-val{color:#e8946a;}
.tarot-card.suit-cups .card-val{color:#8ab8e0;}
.tarot-card.suit-swords .card-val{color:#d8d8a0;}
.tarot-card.suit-pentacles .card-val{color:#90c890;}
/* 宫廷牌 */
.tarot-card.court-card{
  border-color:rgba(255,200,100,0.55);
  background:linear-gradient(165deg,rgba(50,38,20,0.96) 0%,rgba(30,20,12,0.96) 100%);
  box-shadow:2px 3px 10px rgba(255,180,100,0.15);
}
.tarot-card.court-card .card-val{color:#ffcc88;}
.tarot-card.court-card .card-rank{
  font-size:10px;color:#ffcc88;font-weight:bold;letter-spacing:1px;
}
.tarot-card.court-card .card-suit-icon{font-size:30px;}

/* 已方区域加高加宽 */
.element-zone.zone-friendly{min-height:275px;}
.element-zone.zone-friendly .player-zone{padding:8px 10px;min-height:180px;}
.element-zone.zone-enemy{min-height:275px;}
.element-zone.zone-enemy .player-zone{padding:8px 10px;min-height:180px;}

/* 抽牌展示区 */
#draw-area{
  background:rgba(20,15,30,0.9);border:2px solid rgba(180,160,200,0.25);
  border-radius:16px;padding:18px 24px;margin-bottom:8px;
  backdrop-filter:blur(10px);display:flex;align-items:center;gap:24px;
  justify-content:center;min-height:200px;
}
#draw-area .placeholder{color:#555;font-size:14px;}
.draw-preview-card{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 16px 12px;min-width:130px;min-height:165px;
  background:linear-gradient(165deg,rgba(35,28,50,0.96),rgba(18,12,32,0.96));
  border:2px solid rgba(170,155,200,0.35);
  border-radius:12px;box-shadow:3px 4px 12px rgba(0,0,0,0.5);
  position:relative;overflow:hidden;
}
.draw-preview-card::before{
  content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;
  border-radius:9px;border:1px solid rgba(255,255,255,0.05);pointer-events:none;
}
.draw-preview-card .pc-icon{font-size:42px;line-height:1;}
.draw-preview-card .pc-name{font-size:16px;font-weight:bold;color:#e8d5a0;text-align:center;line-height:1.2;}
.draw-preview-card .pc-detail{font-size:11px;color:#aaa;text-align:center;line-height:1.4;max-width:140px;}
.draw-preview-card .pc-restrict{font-size:10px;color:#888;text-align:center;}
.draw-preview-card.court-preview{border-color:rgba(255,200,100,0.55);background:linear-gradient(165deg,rgba(50,38,20,0.96),rgba(30,20,12,0.96));}
.draw-preview-card.court-preview .pc-name{color:#ffcc88;}
.draw-preview-card.major-preview{
  border-color:rgba(255,215,0,0.5);
  background:linear-gradient(165deg,rgba(40,30,20,0.96),rgba(25,15,10,0.96));
  min-width:190px;min-height:175px;
  box-shadow:3px 4px 14px rgba(255,180,50,0.12);
}
.draw-preview-card.major-preview .pc-name{color:#ffd700;font-size:18px;}
.draw-preview-card.major-preview .pc-detail{max-width:240px;font-size:12px;}

#action-bar{
  display:flex;gap:10px;justify-content:center;align-items:center;padding:8px 0;flex-wrap:wrap;
}
.btn{
  padding:10px 24px;border-radius:24px;border:none;cursor:pointer;
  font-size:15px;font-weight:bold;transition:all 0.2s;
  font-family:inherit;letter-spacing:0.5px;
}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn-primary{background:linear-gradient(135deg,#6a3a9a,#8a5aba);color:#fff;box-shadow:0 4px 15px rgba(120,60,180,0.3);}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 20px rgba(120,60,180,0.5);}
.btn-warn{background:linear-gradient(135deg,#9a4a3a,#ba6a5a);color:#fff;box-shadow:0 4px 15px rgba(180,80,60,0.3);}
.btn-success{background:linear-gradient(135deg,#3a7a3a,#5aaa5a);color:#fff;box-shadow:0 4px 15px rgba(60,160,60,0.3);}
.btn-info{background:linear-gradient(135deg,#2a5a8a,#3a7aba);color:#fff;box-shadow:0 4px 15px rgba(60,100,180,0.3);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:16px;}

.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(4px);
}
.modal{
  background:linear-gradient(160deg,#1a1530,#201835);
  border:2px solid rgba(200,180,150,0.3);border-radius:20px;
  padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.modal h3{color:#e8d5a0;margin-bottom:12px;text-align:center;font-size:20px;}
.modal .options{display:flex;flex-direction:column;gap:8px;}
.modal .option{
  padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;cursor:pointer;transition:all 0.2s;color:#d4c8b8;text-align:center;
}
.modal .option:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,215,0,0.5);}
.modal .option.selected{background:rgba(255,215,0,0.15);border-color:#ffd700;color:#ffd700;}
.modal .btn-row{display:flex;gap:10px;justify-content:center;margin-top:12px;}

.orientation-choice{display:flex;gap:12px;justify-content:center;}
.orientation-choice .opt{
  padding:16px 28px;border-radius:14px;cursor:pointer;transition:all 0.25s;
  border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);text-align:center;
}
.orientation-choice .opt:hover{border-color:#ffd700;background:rgba(255,215,0,0.1);}
.orientation-choice .opt .dir{font-size:28px;display:block;margin-bottom:4px;}
.orientation-choice .opt .dir-label{font-size:13px;color:#aaa;}
.orientation-choice .opt .dir-desc{font-size:11px;color:#888;margin-top:4px;max-width:200px;}

.game-over-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(8px);
}
.game-over-panel{
  background:linear-gradient(160deg,#0a0520,#150a30);
  border:3px solid rgba(255,215,0,0.4);border-radius:24px;
  padding:32px;text-align:center;max-width:500px;width:90%;
  box-shadow:0 0 80px rgba(255,215,0,0.2);
}
.game-over-panel h2{font-size:28px;margin-bottom:8px;}
.game-over-panel .winner{font-size:36px;color:#ffd700;margin:12px 0;}
.game-over-panel .detail{font-size:14px;color:#aaa;margin:8px 0;line-height:1.8;}
.game-over-panel .score-table{margin:16px auto;border-collapse:collapse;}
.game-over-panel .score-table td,.game-over-panel .score-table th{
  padding:6px 16px;border:1px solid rgba(255,255,255,0.1);font-size:13px;
}
.game-over-panel .score-table th{color:#e8d5a0;}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:10px 24px;border-radius:20px;color:#fff;font-weight:bold;
  z-index:300;animation:toastIn 0.3s ease-out,toastOut 0.3s 2.2s ease-in forwards;
  font-size:14px;pointer-events:none;
}
.toast.info{background:rgba(60,100,200,0.9);}
.toast.warn{background:rgba(200,120,40,0.9);}
.toast.success{background:rgba(60,160,80,0.9);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

@media(max-width:900px){.battle-row{grid-template-columns:repeat(2,1fr);}}

/* 调试模式按钮 */
.btn-debug{
  padding:2px 10px;font-size:11px;background:rgba(255,180,40,0.12);color:#e8a840;
  border:1px solid rgba(255,180,40,0.3);border-radius:8px;cursor:pointer;
  font-family:inherit;transition:all 0.2s;margin-left:6px;
}
.btn-debug:hover{background:rgba(255,180,40,0.25);border-color:rgba(255,180,40,0.6);}
.btn-debug.active{background:rgba(255,180,40,0.3);color:#ffcc44;box-shadow:0 0 10px rgba(255,180,40,0.2);}

/* 调试面板操作按钮 */
.btn-debug-action{
  padding:16px 24px;border-radius:16px;border:2px solid rgba(255,180,40,0.3);
  background:rgba(255,180,40,0.08);color:#e8c860;font-size:15px;font-weight:bold;
  cursor:pointer;font-family:inherit;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-width:140px;
}
.btn-debug-action:hover{
  background:rgba(255,180,40,0.2);border-color:rgba(255,180,40,0.6);
  transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,180,40,0.15);
}
.btn-debug-action.minor-btn{border-color:rgba(150,150,200,0.35);background:rgba(150,150,200,0.06);color:#c8c8e0;}
.btn-debug-action.minor-btn:hover{border-color:rgba(150,150,200,0.6);background:rgba(150,150,200,0.16);box-shadow:0 6px 20px rgba(150,150,200,0.12);}
.btn-debug-action.major-btn{border-color:rgba(255,215,0,0.35);background:rgba(255,215,0,0.06);color:#e8d5a0;}
.btn-debug-action.major-btn:hover{border-color:rgba(255,215,0,0.6);background:rgba(255,215,0,0.16);box-shadow:0 6px 20px rgba(255,215,0,0.12);}
.btn-debug-action .sub{font-size:10px;color:#888;font-weight:normal;}

/* 调试面板容器 */
#debug-panel{
  display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0;
}
#debug-panel .debug-panel-title{
  color:#e8a840;font-size:15px;font-weight:bold;letter-spacing:2px;
}
#debug-panel .debug-panel-btns{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
}

/* 调试横幅 */
#debug-banner{
  text-align:center;padding:4px 12px;margin-bottom:6px;
  background:rgba(255,180,40,0.1);border:1px dashed rgba(255,180,40,0.3);
  border-radius:8px;font-size:12px;color:#e8a840;letter-spacing:1px;
}

/* 卡牌选择器弹窗 */
.card-selector-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;
  z-index:150;backdrop-filter:blur(6px);
}
.card-selector-panel{
  background:linear-gradient(160deg,#1a1530,#201835);
  border:2px solid rgba(255,215,0,0.3);border-radius:20px;
  padding:20px 24px;max-width:800px;width:95%;max-height:85vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}
.card-selector-panel h3{color:#e8d5a0;text-align:center;margin-bottom:4px;font-size:18px;}
.card-selector-panel .cs-subtitle{color:#888;text-align:center;font-size:11px;margin-bottom:12px;}
.cs-section{margin-bottom:14px;}
.cs-section-title{font-size:14px;color:#e8d5a0;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.1);}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.cs-card{
  padding:8px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;cursor:pointer;text-align:center;transition:all 0.15s;
  font-size:12px;color:#ccc;user-select:none;
}
.cs-card:hover{border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.1);color:#ffd700;transform:translateY(-1px);}
.cs-card.cs-court{border-color:rgba(255,200,100,0.35);background:rgba(255,200,100,0.08);}
.cs-card.cs-court:hover{border-color:rgba(255,200,100,0.7);background:rgba(255,200,100,0.18);}
.cs-card.cs-major{border-color:rgba(255,215,0,0.25);background:rgba(255,215,0,0.06);}
.cs-card.cs-major:hover{border-color:rgba(255,215,0,0.7);background:rgba(255,215,0,0.16);}
.cs-card .cs-icon{font-size:22px;display:block;line-height:1.2;}
.cs-card .cs-val{font-size:10px;color:#888;margin-top:2px;}
.cs-card .cs-name{font-size:11px;line-height:1.2;}

/* 调试选中卡牌预览 */
.debug-preview{border-color:rgba(255,180,40,0.6)!important;background:linear-gradient(165deg,rgba(50,35,15,0.96),rgba(30,20,10,0.96))!important;box-shadow:0 0 20px rgba(255,180,40,0.2)!important;}

/* 数字小牌叠放 */
.card-stack{
  display:flex;flex-direction:row;align-items:center;
  flex-wrap:nowrap;overflow-x:auto;min-height:50px;
  padding:4px 0;position:relative;
}
.card-stack .tarot-card.stacked{
  flex-shrink:0;margin-right:-28px;position:relative;
  width:48px;height:66px;padding:2px 1px 3px;
  transition:all 0.2s;z-index:1;
}
.card-stack .tarot-card.stacked .card-top{
  justify-content:flex-start;padding:0 0 0 2px;
}
.card-stack .tarot-card.stacked .card-val{font-size:10px;line-height:1;}
.card-stack .tarot-card.stacked .card-suit-icon{font-size:20px;}
.card-stack .tarot-card.stacked .card-name{display:none;}
.card-stack .tarot-card.stacked:last-child{margin-right:0;}
.card-stack .tarot-card.stacked:hover{
  transform:translateY(-6px) scale(1.12);
  box-shadow:3px 8px 20px rgba(0,0,0,0.6);
  border-color:rgba(255,215,0,0.7);z-index:10;margin-right:-10px;
}
/* 宫廷牌在叠放中同样重叠 + 右上角品级 */
.card-stack .tarot-card.court-card{

<script>
// ==================== 塔罗对决 v2 - 重写引擎 ====================

const SUITS = ['wands','cups','swords','pentacles'];
const SUIT_NAMES = {wands:'权杖',cups:'圣杯',swords:'宝剑',pentacles:'星币'};
const SUIT_ICONS = {wands:'🪄',cups:'🏆',swords:'⚔️',pentacles:'🪙'};
const RANK_NAMES = {page:'侍从',knight:'骑士',queen:'皇后',king:'国王'};

// === 小阿尔卡纳牌堆 ===
function createMinorDeck(){
  const cards=[];
  for(const suit of SUITS){
    for(let i=1;i<=10;i++){
      cards.push({id:`minor_${suit}_${i}`,type:'minor',subtype:'number',suit,name:`${SUIT_NAMES[suit]}${i}`,points:i,icon:SUIT_ICONS[suit]});
    }
    for(const [rank,label] of Object.entries(RANK_NAMES)){
      cards.push({id:`minor_${suit}_${rank}`,type:'minor',subtype:'court',suit,rank,name:`${label}·${SUIT_NAMES[suit]}`,points:10,icon:SUIT_ICONS[suit]});
    }
  }
  return cards;
}

// === 大阿尔卡那 ===

    r:{desc:'选择1个元素阵，阵中双方所有奇数小牌丢弃',type:'instant'}},

    r:{desc:'己方选择1个数字（1~10），全部元素阵，阵中双方该数字的所有小牌丢弃',type:'instant'}},

    r:{desc:'选择1个元素阵，阵中双方所有小牌互换，然后敌方抽2张小牌打出（宫廷牌不触发抽大牌效果）',type:'instant'}},
  {id:18,name:'月亮',
    u:{desc:'己方抽2张小牌，背朝上打入己方任意1元素阵中（双方不能查看），局终结算时翻开；当该小牌被任意大牌效果影响时，翻开并共同结算影响',type:'instant'},
    r:{desc:'选择1个元素阵，己方抽1张小牌，如果不是当前元素的小牌，则由己方打出并继续抽小牌，直到抽到当前元素小牌，则由敌方打出并停止抽牌',type:'instant'}},
  {id:19,name:'太阳',
    u:{desc:'己方抽4张小牌，选择2张打出，另2张交给敌方打出（宫廷牌不触发抽大牌效果）',type:'instant'},
    r:{desc:'己方抽3张小牌，如果有宫廷牌则全部打出，如果没有宫廷牌则全部丢弃（宫廷牌不触发抽大牌效果）',type:'instant'}},
  {id:20,name:'审判',

    r:{desc:'己方抽3张小牌，选择1张打出或选择全部弃掉并抽1张大牌打出（宫廷牌触发抽大牌效果）',type:'instant'}},
  {id:21,name:'世界',
