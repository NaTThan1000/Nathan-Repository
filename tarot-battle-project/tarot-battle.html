      </div>`;
      html += `<div style="color:#ffd700;font-size:11px;">← 点击元素阵打出大牌</div>`;
      html += `</div>`;
    }
  }
  else if(game.phase === 'lover_choice' && game._pendingLoverCards){
    const cards = game._pendingLoverCards.cards;
    html += `<div id="lover-choice-area">
      <div class="lover-title">💕 恋人正位：请点击选择要保留的牌（另一张给对方）</div>
      <div class="lover-cards">`;
    for(let i=0;i<cards.length;i++){
      const c = cards[i];
      html += `<div class="lover-card" onclick="handleLoverChoice(${i})">
        <div class="lover-card-icon">${c.icon}</div>
        <div class="lover-card-name">${c.name}</div>
        <div class="lover-card-pts">${c.points}点</div>
        <div class="lover-card-suit">${SUIT_ICONS[c.suit]} ${SUIT_NAMES[c.suit]}</div>
        <div class="lover-card-hint">点击保留</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  else if(cp === 'B'){
    // AI回合：不展示AI的牌
    html += `<div class="placeholder">🤖 AI思考中...</div>`;
  } else if(game.drawnMinor){
    const card = game.drawnMinor;
    const isCourt = card.subtype==='court';
    let cardCls = isCourt?'court-preview':'';

    // 小牌 - 卡片式预览
    html += `<div class="draw-preview-card ${cardCls}">
      <div class="pc-icon">${card.icon}</div>
      <div class="pc-name">${card.name}</div>
      <div class="pc-detail">${isCourt?'👑宫廷牌':'数字牌'} · ${card.points}点</div>`;
    if(!isCourt){
      html += `<div class="pc-restrict">仅可打入${SUIT_ICONS[card.suit]}${SUIT_NAMES[card.suit]}阵</div>`;
    }
    if(game.phase==='play_minor'){
      html += `<div style="color:#8ab8e0;font-size:11px;margin-top:auto;">← 点击上方出牌</div>`;
    }
    html += `</div>`;

    // 大牌预览
    if(game.drawnMajor){
      const mc = game.drawnMajor;
      const orient = game.majorOrientation;
      const desc = orient==='upright' ? mc.effectDesc : mc.revEffectDesc;
      const isPlayable = game.phase==='play_major';
      html += `<div class="draw-preview-card major-preview">
        <div class="pc-icon">🌟</div>
        <div class="pc-name">${mc.name}</div>
        <div class="pc-detail">${orient==='upright'?'☀️正位':'🌑逆位'}：${desc}</div>`;
      html += `<div class="toggle-orient" style="margin-top:auto;" onclick="event.stopPropagation();toggleOrientation()" title="点击切换正位/逆位">
        <span class="arrow">${orient==='upright'?'☀️':'🌑'}</span>
        <span>${orient==='upright'?'正位':'逆位'}</span>
        <span style="font-size:10px;color:#888;">↔${isPlayable?'切换':'预览'}</span>
      </div>`;
      if(game.phase==='play_minor' && isCourt){
        html += `<div style="color:#ffcc88;font-size:11px;">先出宫廷牌→再出大牌</div>`;
      } else if(isPlayable){
        html += `<div style="color:#ffd700;font-size:11px;">← 点击元素阵打出大牌</div>`;
      }
      html += `</div>`;
    }
  } else {
    html += `<div class="placeholder">等待抽牌...</div>`;
  }

  html += `</div>`;
  return html;
}

// ====== 交互 ======
function onElementClick(targetPlayer, suit){
  if(game.gameOver) return;

  // ===== 调试模式：自由选牌打出 =====
  if(debugSelectedCard){
    const card = debugSelectedCard;
    const orient = debugSelectedOrient;

    if(card.type === 'minor'){
      // 小牌：数字牌须遵守花色规则
      if(card.subtype === 'number'){
        // 检查是否对应花色阵
        if(card.suit !== suit){
          // 检查教皇正位(5U)是否允许选该阵
          const popeActive = game.players[targetPlayer].elements[suit].activeMajor;
          const popeAllow = popeActive && popeActive.arcanaId===5 && popeActive.orientation==='upright';
          if(!popeAllow){
            showToast(`🔧 [调试] ${card.name}只能打入${SUIT_NAMES[card.suit]}阵`,'warn');
            return;
          }
        }
        // 检查魔术师逆位(1R)：必须加其他阵
        if(game._chkAnyPersistent('A', suit, 1, 'reversed') && card.suit === suit){
          showToast(`🔧 [调试] 魔术师逆位：必须打入${SUIT_NAMES[card.suit]}以外的阵`,'warn');
          return;
        }
      }
      // 调用正常打牌逻辑（内部处理持续性效果限制）
      game.addLog(`🔧 [调试] ${targetPlayer==='A'?'🔵A':'🔴B'} 手动打出小牌 ${card.name}`);
      game.playMinorToElement(targetPlayer, {...card}, suit);
    } else if(card.type === 'major'){
      // 大牌
      const etype = orient==='upright' ? card.effectType : card.revEffectType;
      game.addLog(`🔧 [调试] ${targetPlayer==='A'?'🔵A':'🔴B'} 手动打出大牌 ${card.name}(${orient==='upright'?'正位':'逆位'}) → ${SUIT_NAMES[suit]}阵 [${etype==='instant'?'一次性':etype==='persistent'?'持续性':'触发性'}]`);

      if(etype === 'instant'){
        // 一次性：执行效果后弃牌，记录到弃牌历史
        game._execEffect(targetPlayer, {...card}, suit, orient);
        game.majorDiscard.push({...card});
        const el = game.players[targetPlayer].elements[suit];
        const desc = orient==='upright' ? card.effectDesc : card.revEffectDesc;
        el.majorHistory.push({
          name: card.name, arcanaId: card.arcanaId, orientation: orient,
          effectDesc: desc, detail: game._effectDetail||'一次性效果生效完毕', turn: game.totalActions, type: etype
        });
      } else {
        // 持续性/触发性：放置在阵中，不进入弃牌堆
        game._setupActiveMajor(targetPlayer, {...card}, suit, orient);
      }
    }

    // 清除选中状态，刷新界面
    debugUsedCardIds.add(debugSelectedCard.id);
    debugSelectedCard = null;
    debugDrawnFromDeck = false;
    debugSelectedOrient = 'upright';
    render();
    return;
  }

  // ===== 正常游戏模式 =====
  if(game.currentPlayer !== 'A') return;

  // 太阳正位：等待选择第二个阵
  if(game.phase === 'sun_swap' && game._pendingSunSwap){
    if(targetPlayer !== game._pendingSunSwap.player){
      showToast('请在己方区域选择第二个阵','warn'); return;
    }
    if(suit === game._pendingSunSwap.element1){
      showToast('请选择不同的元素阵','warn'); return;
    }
    game._executeSunSwap(game._pendingSunSwap.player, game._pendingSunSwap.element1, suit);
    game._pendingSunSwap = null;
    game.endTurn();
    render();
    setTimeout(() => continueFlow(), 400);
    return;
  }

  // 恋人正位等待状态时不允许操作元素阵
  if(game.phase === 'lover_choice') return;

  // 仅允许操作己方区域（后续扩展时可放开敌方点击逻辑）
  if(targetPlayer !== 'A'){
    showToast('当前回合只能操作己方区域','warn');
    return;
  }

  if(game.phase === 'play_minor'){
    // 打出小牌
    const card = game.drawnMinor;
    if(!card) return;

    // 数字牌必须打入对应花色阵（除非有魔术师效果）
    if(card.subtype === 'number'){
      // 数字牌必须打入对应花色阵（教皇正位5U允许选该阵或对应阵）
      const popeActive = game.players.A.elements[suit].activeMajor;
      const popeAllow = popeActive && popeActive.arcanaId===5 && popeActive.orientation==='upright';
      if(card.suit !== suit && !popeAllow){
        showToast(`${card.name}只能打入${SUIT_NAMES[card.suit]}阵`,'warn');
        return;
      }
      // 检查魔术师逆位(1R)：必须加到其他阵
      if(game._chkAnyPersistent('A', suit, 1, 'reversed') && card.suit === suit){
        showToast(`魔术师逆位：必须打入${SUIT_NAMES[card.suit]}以外的阵`,'warn');
        return;
      }
      game.playMinorToElement('A', card, suit);
      game.addLog(`  → ${card.name}打入己方${SUIT_NAMES[suit]}阵(+${card.points})`);
      if(game.drawnMajor){
        // 倒吊人逆位延迟大牌：进入大牌选择阶段
        game.phase = 'play_major';
        game.majorOrientation = 'upright';
        render();
        return;
      }
      game.endTurn();
      render();
      setTimeout(() => continueFlow(), 400);
      return;
    }

    // 宫廷牌：任意阵
    if(card.subtype === 'court'){
      game.courtSelectElement(suit);
      render();
      if(game.phase === 'play_major'){
        // 大牌已抽出，等待大牌决策
        return;
      } else {
        // 大牌堆空，回合结束
        setTimeout(() => continueFlow(), 400);
        return;
      }
    }
  }

  if(game.phase === 'play_major'){
    // 打出大牌到选中阵
    game.majorDecision(true, suit);
    render();
    setTimeout(() => continueFlow(), 400);
  }
}

function toggleOrientation(){
  game.majorOrientation = game.majorOrientation==='upright'?'reversed':'upright';
  render();
}

function debugToggleOrient(){
  debugSelectedOrient = debugSelectedOrient==='upright'?'reversed':'upright';
  render();
}

function onDiscardMajor(){
  if(game.phase !== 'play_major' || game.currentPlayer !== 'A') return;
  game.majorDecision(false);
  render();
  setTimeout(() => continueFlow(), 400);
}

/** 恋人正位(6U)：玩家点击选择保留的牌 */
function handleLoverChoice(keepIdx){
  if(game.phase !== 'lover_choice' || !game._pendingLoverCards) return;
  const lp = game._pendingLoverCards;
  const keep = lp.cards[keepIdx], give = lp.cards[1-keepIdx];
  // 保留牌打入己方阵
  game.playMinorToElement(lp.player, keep, keep.suit, true);
  // 另一张给对方
  game.playMinorToElement(lp.player==='A'?'B':'A', give, give.suit, true);
  game.addLog(`  💕 恋人正位：己方保留${keep.name}(+${keep.points})，${give.name}(${give.points})给对方`);
  game._pendingLoverCards = null;
  game.endTurn();
  render();
  setTimeout(() => continueFlow(), 400);
}

function buildZonePreview(player, suit){
  const el = game.players[player].elements[suit];
  const label = player==='A'?'己方':'敌方';
  const cardNames = el.cards.map(c=>`${c.icon}${c.name}(${c.points}点)`).join('、') || '空';
  const activeMajor = el.activeMajor;
  const majorInfo = activeMajor ? ` | 大牌:${activeMajor.name}(${activeMajor.orientation==='upright'?'正':'逆'})` : '';
  const lockedInfo = el.lockedScore!==null ? ` [锁定:${el.lockedScore}]` : '';
  return `${label}${SUIT_NAMES[suit]}阵 | 得分:${el.score}${lockedInfo} | 小牌:${cardNames}${majorInfo}`;
}

function showMajorDetail(player, suit, index){
  const el = game.players[player].elements[suit];
  let m;
  if(index === -1){
    // activeMajor
    m = el.activeMajor;
    if(!m) return;
    m = {name:m.name, orientation:m.orientation, effectDesc:m.desc, detail:`类型：${m.type==='persistent'?'持续性':'触发性'}`, turn:'当前'};
  } else {
    const hist = el.majorHistory;
    if(index<0||index>=hist.length) return;
    m = hist[index];
  }
  const overlay = document.createElement('div');
  overlay.className = 'major-detail-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="major-detail-panel">
      <h4>🌟 ${m.name} <span style="font-size:12px;color:${m.orientation==='upright'?'#ffd700':'#999'};">${m.orientation==='upright'?'正位':'逆位'}</span></h4>
      <div style="color:#aaa;font-size:13px;margin-bottom:4px;">${SUIT_ICONS[suit]} ${SUIT_NAMES[suit]}阵 · ${player==='A'?'玩家A':'玩家B'}打出</div>
      <div style="color:#d4c8b8;font-size:14px;line-height:1.6;">效果：${m.effectDesc}</div>
      ${m.detail?`<div style="color:#e8d5a0;font-size:13px;margin-top:4px;line-height:1.4;">详情：${m.detail}</div>`:''}
      <div style="color:#666;font-size:11px;margin-top:8px;">${typeof m.turn==='number'?`第${m.turn}次行动时打出`:m.turn}</div>
      <button class="btn btn-sm" style="margin-top:8px;background:rgba(255,255,255,0.1);color:#aaa;" onclick="this.closest('.major-detail-overlay').remove()">关闭</button>
    </div>`;
  document.body.appendChild(overlay);
}

// === 大牌hover提示 ===
let _tooltipEl = null;
function showMajorTooltip(e, name, orient, desc, type){
  if(!_tooltipEl){
    _tooltipEl = document.createElement('div');
    _tooltipEl.className = 'major-pile-tooltip';
    document.body.appendChild(_tooltipEl);
  }
  const typeLabel = type==='persistent'?'[持续性]':type==='trigger'?'[触发性]':'';
  _tooltipEl.innerHTML = `
    <div class="tt-name">🌟 ${name} <span style="font-size:11px;color:${orient==='upright'?'#ffd700':'#999'};">${orient==='upright'?'☀️正位':'🌑逆位'}</span></div>
    <div class="tt-type">${typeLabel}</div>
    <div style="margin-top:4px;">${desc||'无描述'}</div>`;
  // 定位在鼠标附近
  const x = e.clientX + 16, y = e.clientY - 10;
  _tooltipEl.style.left = Math.min(x, window.innerWidth - 280) + 'px';
  _tooltipEl.style.top = Math.min(y, window.innerHeight - 120) + 'px';
  _tooltipEl.classList.add('show');
}
function hideMajorTooltip(){
  if(_tooltipEl) _tooltipEl.classList.remove('show');
}

// === 弃牌堆弹窗 ===
function showMajorDiscardPile(player, suit){
  const el = game.players[player].elements[suit];
  const history = el.majorHistory || [];
  const playerLabel = player==='A'?'玩家A':'玩家B';

  let gridHTML = '';
  if(history.length === 0){
    gridHTML = '<div style="color:#666;text-align:center;padding:20px;">该阵暂无弃牌</div>';
  } else {
    for(const m of history){
      gridHTML += `<div class="discard-grid-card" onclick="event.stopPropagation();showMajorDetailFromData('${player}','${suit}',${history.indexOf(m)})">
        <div class="dgc-name">🌟 ${m.name}</div>
        <div class="dgc-ori" style="color:${m.orientation==='upright'?'#ffd700':'#999'}">${m.orientation==='upright'?'☀️正位':'🌑逆位'}</div>
        <div class="dgc-desc">${m.effectDesc||''}</div>
      </div>`;
    }
  }

  const overlay = document.createElement('div');
  overlay.className = 'discard-grid-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="discard-grid-panel">
      <h4>🗂️ ${playerLabel} · ${SUIT_ICONS[suit]} ${SUIT_NAMES[suit]}阵 弃牌</h4>
      <div class="dg-sub">共 ${history.length} 张已打出的大牌</div>
      <div class="dg-grid">${gridHTML}</div>
      <div style="text-align:center;margin-top:12px;">
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#aaa;border:1px solid rgba(255,255,255,0.2);" onclick="this.closest('.discard-grid-overlay').remove()">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function showMajorDetailFromData(player, suit, index){
  // 关闭弃牌弹窗
  const dgOverlay = document.querySelector('.discard-grid-overlay');
  if(dgOverlay) dgOverlay.remove();
  // 显示大牌详情
  showMajorDetail(player, suit, index);
}

function showLogViewer(){
  const overlay = document.createElement('div');
  overlay.className = 'major-detail-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  let logHTML = '';
  for(const log of game.logs){
    logHTML += `<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#ccc;">${log}</div>`;
  }
  overlay.innerHTML = `
    <div class="major-detail-panel" style="max-width:600px;max-height:70vh;overflow-y:auto;">
      <h4>📋 出牌日志</h4>
      <div style="margin-bottom:8px;">${logHTML||'暂无记录'}</div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#aaa;" onclick="this.closest('.major-detail-overlay').remove()">关闭</button>
    </div>`;
  document.body.appendChild(overlay);
}

// ====== 流程控制 ======
function continueFlow(){
  if(debugMode) return; // 调试模式下暂停自动流程
  if(game.gameOver) {
    showGameOver();
    return;
  }

  if(game.currentPlayer === 'B'){
    runAITurn();
  } else if(game.currentPlayer === 'A'){
    // A的回合刚开始
    if(game.phase === 'play_minor' && !game.drawnMinor){
      game.startTurn();
    }
    render();
    if(game.gameOver){ showGameOver(); return; }
    // 等待用户点击元素出牌
  }
}

function runAITurn(){
  if(debugMode) return; // 调试模式下暂停AI
  if(game.gameOver) { showGameOver(); return; }

  game.startTurn();
  render();

  if(game.gameOver){ showGameOver(); return; }

  setTimeout(() => {
    // AI出小牌
    game.aiAct();
    render();

    if(game.gameOver){ showGameOver(); return; }

    // AI可能需要出大牌
    if(game.phase === 'play_major' && game.currentPlayer === 'B'){
      setTimeout(() => {
        game.aiAct();
        render();

        if(game.gameOver){ showGameOver(); return; }

        // B回合完成，A开始
        setTimeout(() => {
          if(game.gameOver){ showGameOver(); return; }
          game.startTurn();
          render();

          if(game.gameOver){ showGameOver(); return; }

          // A等用户操作
          if(game.currentPlayer === 'A' && game.phase === 'play_minor'){
            return;
          }
          if(game.currentPlayer === 'B'){
            setTimeout(() => continueFlow(), 400);
          }
        }, 500);
      }, 500);
      return;
    }

    // 无大牌（空堆或数字牌），直接到A
    setTimeout(() => {
      if(game.gameOver){ showGameOver(); return; }
      game.startTurn();
      render();

      if(game.gameOver){ showGameOver(); return; }

      if(game.currentPlayer === 'A' && game.phase === 'play_minor'){
        return;
      }
      if(game.currentPlayer === 'B'){
        setTimeout(() => continueFlow(), 400);
      }
    }, 500);
  }, 500);
}

function showGameOver(){
  const result = game.finalScore();
  const winner = game.determineWinner(result);

  let detailHTML = '';
  for(const d of result.details){
    detailHTML += `<tr>
      <td>${SUIT_ICONS[d.element]} ${SUIT_NAMES[d.element]}</td>
      <td>${d.scoreA}</td><td>${d.scoreB}</td>
      <td>${d.winner==='A'?'🔵A':d.winner==='B'?'🔴B':'平局'}</td>
      <td>${d.points}分</td>
    </tr>`;
  }

  const existOverlay = document.querySelector('.game-over-overlay');
  if(existOverlay) existOverlay.remove();

  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="game-over-panel">
      <h2>🏆 游戏结束</h2>
      <div style="color:#aaa;font-size:13px;">小牌堆已空 · 共${game.totalActions}次行动</div>
      <div class="winner">${winner==='A'?'🔵 玩家A 获胜！':'🔴 玩家B 获胜！'}</div>
      <table class="score-table">
        <tr><th>元素</th><th>A分数</th><th>B分数</th><th>胜者</th><th>得分</th></tr>
        ${detailHTML}
        <tr style="font-weight:bold;color:#ffd700;">
          <td>总计</td><td>${result.totalA}</td><td>${result.totalB}</td>
          <td colspan="2">A:${result.A}分 | B:${result.B}分</td>
        </tr>
      </table>
      ${result.A===result.B?`<div class="detail">⚖️ 得分平局！${result.totalA>result.totalB?'A总点数领先':result.totalB>result.totalA?'B总点数领先':'先手方A获胜'}</div>`:''}
      <button class="btn btn-primary" style="margin-top:16px;" onclick="init();this.closest('.game-over-overlay').remove();">🔄 再来一局</button>
    </div>`;
  document.body.appendChild(overlay);
}
