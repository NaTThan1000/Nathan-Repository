<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>22张塔罗大牌 · 正逆位效果速查</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --card-upright: #0f3460;
    --card-reversed: #5c2a4a;
    --text: #e0e0e0;
    --gold: #d4a574;
    --instant: #e94560;
    --persistent: #533483;
    --trigger: #f5a623;
    --overlay-bg: rgba(0,0,0,0.75);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px 12px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  header {
    text-align: center;
    padding: 12px 0 20px;
  }
  header h1 {
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  header p {
    font-size: 13px;
    color: #888;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 420px;
    margin: 0 auto;
  }
  .card-cell {
    background: var(--card-bg);
    border: 1.5px solid #2a2a4a;
    border-radius: 12px;
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 72px;
    position: relative;
    overflow: hidden;
  }
  .card-cell:active {
    transform: scale(0.95);
    border-color: var(--gold);
    background: #1e2a4a;
  }
  .card-num {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: #ddd;
    line-height: 1.3;
  }
  .card-type-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin: 0 auto 4px;
  }
  .type-instant { background: var(--instant); }
  .type-persistent { background: var(--persistent); }
  .type-trigger { background: var(--trigger); }
  .type-dots {
    display: flex;
    gap: 3px;
    margin: 0 auto 4px;
  }
  .dot-instant { background: var(--instant); }
  .dot-persistent { background: var(--persistent); }
  .dot-trigger { background: var(--trigger); }
  .dot-mini {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    animation: fadeIn 0.2s;
  }
  .overlay.active {
    display: flex;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: #1e1e3a;
    border: 1.5px solid #3a3a5a;
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px;
    animation: slideUp 0.25s;
    -webkit-overflow-scrolling: touch;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #2a2a4a;
  }
  .modal-num {
    font-size: 13px;
    color: #888;
    margin-bottom: 2px;
  }
  .modal-name {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .effect-block {
    margin-bottom: 16px;
    border-radius: 12px;
    padding: 16px;
  }
  .effect-block.upright {
    background: rgba(15, 52, 96, 0.5);
    border: 1px solid rgba(15, 52, 96, 0.8);
  }
  .effect-block.reversed {
    background: rgba(92, 42, 74, 0.4);
    border: 1px solid rgba(92, 42, 74, 0.7);
  }
  .effect-label {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .upright .effect-label { color: #5dade2; }
  .reversed .effect-label { color: #e87da0; }

  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
  }
  .badge-instant { background: var(--instant); }
  .badge-persistent { background: var(--persistent); }
  .badge-trigger { background: var(--trigger); }

  .effect-text {
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 16px 0 4px;
    font-size: 11px;
    color: #888;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Scrollbar */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }

  /* Close hint */
  .close-hint {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-top: 16px;
  }


</style>
</head>
<body>

<header>
  <h1>🃏 塔罗大牌效果速查</h1>
  <p>点击卡牌查看正逆位效果</p>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot type-instant"></span> 一次性</span>
    <span class="legend-item"><span class="legend-dot type-persistent"></span> 持续性</span>
    <span class="legend-item"><span class="legend-dot type-trigger"></span> 触发性</span>
  </div>
</header>

<div class="card-grid" id="cardGrid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ─── 读取 CSV 数据 ───
const csvRaw = `序号,牌名,正逆位,简化版效果,效果类型
0,愚人,正位,选择1个元素阵，阵中双方所有小牌丢弃（小牌弃掉，持续性大牌不动）,一次性
0,愚人,逆位,选择1个元素阵，阵中双方大牌丢弃,一次性
I,魔术师,正位,选择1个元素阵，阵中己方所有小牌移至另1元素阵,一次性
I,魔术师,逆位,选择1个元素阵，阵中双方后续打出的小牌只能打入其他任意元素阵（仅影响抽牌后打出的小牌）,持续性
II,女祭司,正位,选择1个元素阵，阻止阵中双方所有大牌对已方元素阵已打出小牌的影响（可以出但是没效果，不能阻止该大牌被丢弃）,持续性
II,女祭司,逆位,选择1个元素阵，阵中敌方后续打出的下1张大牌丢弃（被丢弃的大牌效果不生效），并丢弃此牌,触发性
III,女皇,正位,己方抽1张小牌并打出（宫廷牌触发抽大牌效果）,一次性
III,女皇,逆位,敌方丢弃下1张抽到的小牌（宫廷牌不触发抽大牌效果）,一次性
IV,皇帝,正位,选择1个元素阵，阵中双方点数锁定（不影响后续打出大小牌，该牌被丢弃后重新计算点数）,持续性
IV,皇帝,逆位,选择1个元素阵，如果阵中此牌在本局游戏结算时未被丢弃，则阵中双方结算时胜方计2分,持续性
V,教皇,正位,选择1个元素阵，阵中己方后续打出小牌时，可以选择打入该阵或对应元素阵,持续性
V,教皇,逆位,选择1个元素阵，阵中敌方大牌移至己方该元素阵（当前属性阵大牌将丢弃）,一次性
VI,恋人,正位,己方抽2张小牌，选择1张打入己方阵中，另1张打入敌方阵中（需要按照元素阵打出，宫廷牌不触发抽大牌效果）,一次性
VI,恋人,逆位,己方抽1张小牌，替换掉敌方或我方场上任意1张小牌（宫廷牌不触发抽大牌效果）,一次性
VII,战车,正位,选择1个元素阵，阵中敌方后续打出的大牌失效,持续性
VII,战车,逆位,选择1个元素阵，阵中敌方后续打出大牌时，己方也触发相同效果,持续性
VIII,力量,正位,己方抽2张小牌并打出（宫廷牌不触发抽大牌效果）,一次性
VIII,力量,逆位,选择1个元素阵（己方至少有3张小牌，否则无法打出），阵中己方所有小牌丢弃，不断抽牌并打出，直到抽到宫廷牌打出后结束（打出该宫廷牌不触发抽大牌效果）,一次性
IX,隐士,正位,丢弃小牌牌堆最上面2张小牌，之后可以选择弃掉此大牌，或将此牌放回大牌堆最上层,一次性
IX,隐士,逆位,选择1个元素阵，阵中双方后续打出的小牌都打入对方当前元素阵（原本该阵的小牌无影响）,持续性
X,命运之轮,正位,全部元素阵，阵中己方所有小牌移至右手边位置的牌阵中，最右侧牌阵的小牌移至最左侧牌阵,一次性
X,命运之轮,逆位,全部元素阵，阵中己方所有小牌移至左手边位置的牌阵中，最左侧牌阵的小牌移至最右侧牌阵,一次性
XI,正义,正位,全部元素阵，阵中双方小牌点数高的一方中，最小点数的牌移至另一方的元素阵（小牌点数相同的元素阵无影响）,一次性
XI,正义,逆位,全部元素阵，阵中双方小牌数量多的一方中，最大点数的牌移至另一方的元素阵（小牌数量相同的元素阵无影响）,一次性
XII,倒吊人,正位,选择1个元素阵，阵中己方大牌丢弃，并抽1张大牌打出,一次性
XII,倒吊人,逆位,选择1个元素阵，阵中敌方大牌丢弃，并抽1张大牌由敌方选择打出,一次性
XIII,死神,正位,选择1个元素阵，阵中己方所有小牌丢弃，并抽相同数量小牌打出（宫廷牌不触发抽大牌效果）,一次性
XIII,死神,逆位,选择1个元素阵，阵中双方后续打出的小牌丢弃（宫廷牌不触发抽大牌效果）,持续性
XIV,节制,正位,选择1个元素阵，阵中双方所有小牌洗混，并按照洗混前各自数量分配打出（宫廷牌不触发抽大牌效果）,一次性
XIV,节制,逆位,选择1个元素阵，阵中敌方后续打出小牌时，需要选择丢弃该阵中1张小牌,持续性
XV,恶魔,正位,选择1个元素阵，阵中敌方后续打出小牌时，改为打出在己方阵（宫廷牌抽触发大牌效果由抽牌方打出）,触发性
XV,恶魔,逆位,选择1个元素阵，其他阵中敌方后续打出的小牌丢弃（宫廷牌不触发抽大牌效果）；阵中敌方后续打出小牌时，阵中己方所有小牌丢弃，并丢弃此大牌,持续性
XVI,塔,正位,选择1个元素阵，阵中双方点数排名发生变化时，阵中双方所有小牌丢弃，并丢弃此大牌,触发性
XVI,塔,逆位,双方各自最高点数的元素阵，阵中双方所有小牌丢弃（出现并列最高点数时，对应元素阵均生效）,一次性
XVII,星星,正位,选择1个元素阵，阵中己方后续打出小牌时，抽1张小牌打出（宫廷牌触发抽大牌效果），可重复触发,持续性
XVII,星星,逆位,选择1个元素阵，阵中双方所有小牌互换，但阵中双方后续打出的小牌全部打入敌方阵中（宫廷牌抽触发大牌效果由抽牌方打出）,持续性
XVIII,月亮,正位,己方抽2张小牌，背朝上打入己方任意1元素阵中，局终结算时翻开；当该小牌被任意大牌效果影响时，翻开并共同结算影响,一次性
XVIII,月亮,逆位,选择1个元素阵，当己方抽到该阵元素小牌时，先立刻互换双方当前阵小牌，随后打出抽到的小牌，可重复触发,持续性
XIX,太阳,正位,选择2个元素阵，阵中己方所有小牌互换,一次性
XIX,太阳,逆位,选择1个元素阵，如果阵中此牌在本局游戏结算时未被丢弃，则本局游戏胜负按当前元素阵点数胜负关系判定,持续性
XX,审判,正位,全部元素阵，阵中双方所有大牌丢弃,一次性
XX,审判,逆位,选择1个元素阵，阵中己方大牌丢弃，并抽2张小牌并打出（宫廷牌可触发抽大牌效果，结算后再抽下1张）,一次性
XXI,世界,正位,选择1个元素阵，如果阵中双方所有1~10小牌均已打出（不分敌我），则当前元素阵结算时判定为己方胜利,持续性
XXI,世界,逆位,选择1个元素阵，如果阵中此牌在本局游戏结算时未被丢弃，则结算前互换该阵双方小牌,持续性`;

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 5) continue;
    data.push({
      numLabel: cols[0].trim(),
      name: cols[1].trim(),
      orientation: cols[2].trim() === '正位' ? 'upright' : 'reversed',
      effect: cols[3].trim(),
      type: cols[4].trim()
    });
  }
  return data;
}

const effectData = parseCSV(csvRaw);

// 按序号分组
const cards = [];
const seen = new Set();
for (const row of effectData) {
  if (!seen.has(row.numLabel)) {
    seen.add(row.numLabel);
    const upright = effectData.find(r => r.numLabel === row.numLabel && r.orientation === 'upright');
    const reversed = effectData.find(r => r.numLabel === row.numLabel && r.orientation === 'reversed');
    const types = new Set();
    if (upright) types.add(upright.type);
    if (reversed) types.add(reversed.type);
    cards.push({
      numLabel: row.numLabel,
      name: row.name,
      upright: upright,
      reversed: reversed,
      types: [...types]
    });
  }
}

// 序号排序：0, I, II, ... XXI
const romanOrder = ['0','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];
cards.sort((a, b) => romanOrder.indexOf(a.numLabel) - romanOrder.indexOf(b.numLabel));

function getTypeDotClass(type) {
  if (type === '一次性') return 'dot-instant';
  if (type === '持续性') return 'dot-persistent';
  if (type === '触发性') return 'dot-trigger';
  return '';
}

function getTypeBadgeClass(type) {
  if (type === '一次性') return 'badge-instant';
  if (type === '持续性') return 'badge-persistent';
  if (type === '触发性') return 'badge-trigger';
  return '';
}

// ─── 渲染卡牌网格 ───
const grid = document.getElementById('cardGrid');
cards.forEach(card => {
  const cell = document.createElement('div');
  cell.className = 'card-cell';
  const dotsHTML = card.types.length > 1
    ? `<span class="type-dots">${card.types.map(t => `<span class="dot-mini ${getTypeDotClass(t)}"></span>`).join('')}</span>`
    : `<span class="card-type-dot ${getTypeDotClass(card.types[0])}"></span>`;
  cell.innerHTML = `
    ${dotsHTML}
    <span class="card-num">${card.numLabel}</span>
    <span class="card-name">${card.name}</span>
  `;
  cell.addEventListener('click', (e) => {
    e.stopPropagation();
    showModal(card);
  });
  grid.appendChild(cell);
});

// ─── 弹窗逻辑 ───
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');

overlay.addEventListener('click', () => {
  overlay.classList.remove('active');
});

modal.addEventListener('click', (e) => {
  e.stopPropagation();
});

// 触摸滑动穿透修复
modal.addEventListener('touchmove', (e) => {
  e.stopPropagation();
});

function showModal(card) {
  const u = card.upright;
  const r = card.reversed;
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-num">${card.numLabel}</div>
      <div class="modal-name">${card.name}</div>
    </div>
    ${u ? `
    <div class="effect-block upright">
      <div class="effect-label">☀ 正位 <span class="type-badge ${getTypeBadgeClass(u.type)}">${u.type}</span></div>
      <div class="effect-text">${u.effect}</div>
    </div>
    ` : ''}
    ${r ? `
    <div class="effect-block reversed">
      <div class="effect-label">☾ 逆位 <span class="type-badge ${getTypeBadgeClass(r.type)}">${r.type}</span></div>
      <div class="effect-text">${r.effect}</div>
    </div>
    ` : ''}
    <div class="close-hint">点击弹窗外区域关闭</div>
  `;
  modal.scrollTop = 0;
  overlay.classList.add('active');
}
</script>
</body>
</html>
