<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗对决 - 桌游原型 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(160deg,#0d0d1a 0%,#1a1025 30%,#0d1520 70%,#0a0a14 100%);
  min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;
  color:#d4c8b8;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(120,80,200,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(200,150,50,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(80,120,200,0.05) 0%,transparent 60%);
}
#app{max-width:1400px;margin:0 auto;padding:8px 12px;}

#top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(20,15,30,0.85);
  border:1px solid rgba(180,160,200,0.2);border-radius:12px;
  margin-bottom:8px;backdrop-filter:blur(10px);
}
#round-info{font-size:18px;font-weight:bold;color:#e8d5a0;}
#round-info span{color:#c8a860;font-size:24px;}
#phase-info{
  padding:4px 16px;border-radius:20px;font-size:14px;font-weight:bold;transition:all 0.3s;
}
.phase-a{background:rgba(100,180,255,0.2);color:#8cc8ff;border:1px solid rgba(100,180,255,0.3);}
.phase-b{background:rgba(255,140,100,0.2);color:#ffaa88;border:1px solid rgba(255,140,100,0.3);}
#deck-info{display:flex;gap:12px;font-size:13px;color:#aaa;}
.deck-count{padding:2px 10px;border-radius:6px;background:rgba(0,0,0,0.3);}
.deck-count.minor{border:1px solid rgba(150,150,200,0.3);}
.deck-count.major{border:1px solid rgba(255,215,0,0.3);color:#e8d5a0;}

#log-area{
  margin-top:6px;padding:4px 12px;background:rgba(0,0,0,0.4);border-radius:8px;
  font-size:12px;color:#aaa;max-height:48px;overflow-y:auto;min-height:24px;
}

#battlefield{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:10px;min-height:380px;
}
.element-zone{
  background:rgba(15,10,25,0.8);border:2px solid rgba(100,80,160,0.3);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;
  transition:all 0.3s;
}
.element-zone.highlight{border-color:rgba(255,215,0,0.8);box-shadow:0 0 20px rgba(255,215,0,0.15);}
.element-zone.selectable{border-color:rgba(100,200,255,0.7);box-shadow:0 0 16px rgba(100,200,255,0.2);cursor:pointer;}
.element-zone.selectable:hover{border-color:rgba(100,220,255,1);box-shadow:0 0 24px rgba(100,220,255,0.35);transform:translateY(-2px);}
.element-zone.selected-zone{border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.3);}

.element-header{
  text-align:center;padding:6px 8px;font-weight:bold;font-size:14px;
  letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px;
}
.element-header .icon{font-size:20px;}
.elem-wands .element-header{background:rgba(200,80,40,0.25);color:#e8946a;}
.elem-cups .element-header{background:rgba(60,140,200,0.25);color:#8ab8e0;}
.elem-swords .element-header{background:rgba(180,180,100,0.25);color:#d8d8a0;}
.elem-pentacles .element-header{background:rgba(80,160,80,0.25);color:#90c890;}

.player-zone{
  flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:4px;min-height:90px;position:relative;
}
.player-zone.player-b{border-bottom:1px dashed rgba(255,255,255,0.1);}
.player-zone.player-a{border-top:1px dashed rgba(255,255,255,0.1);}
.player-label{
  font-size:11px;color:rgba(255,255,255,0.5);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.player-label .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.player-label .dot.a{background:#6ab8ff;}
.player-label .dot.b{background:#ff8866;}
.score-display{text-align:center;padding:4px 0;font-weight:bold;}
.score-display .score-num{font-size:20px;color:#e8d5a0;}
.score-display .score-label{font-size:10px;color:#888;}
.score-display .score-effects{font-size:10px;color:#c8a860;margin-top:2px;}

.card-mini{
  display:inline-flex;align-items:center;gap:3px;padding:2px 6px;
  border-radius:6px;font-size:11px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);margin:1px 2px;
  transition:all 0.2s;
}
.card-mini.court{border-color:rgba(255,200,100,0.5);background:rgba(255,200,100,0.12);color:#ffcc88;}
.cards-row{display:flex;flex-wrap:wrap;gap:2px;min-height:22px;}

/* 抽牌展示区 */
#draw-area{
  background:rgba(20,15,30,0.9);border:2px solid rgba(180,160,200,0.25);
  border-radius:16px;padding:14px 20px;margin-bottom:8px;
  backdrop-filter:blur(10px);display:flex;align-items:center;gap:20px;
  justify-content:center;min-height:80px;
}
#draw-area .placeholder{color:#555;font-size:14px;}
#draw-area .drawn-card{
  display:flex;align-items:center;gap:12px;padding:8px 16px;
  background:rgba(255,255,255,0.06);border-radius:12px;border:1px solid rgba(255,255,255,0.1);
}
#draw-area .drawn-card .card-icon{font-size:32px;}
#draw-area .drawn-card .card-name{font-size:16px;font-weight:bold;color:#e8d5a0;}
#draw-area .drawn-card .card-detail{font-size:13px;color:#aaa;}
#draw-area .drawn-card.minor-card{border-color:rgba(150,150,200,0.3);}
#draw-area .drawn-card.major-card{border-color:rgba(255,215,0,0.4);}
#draw-area .drawn-card.court-card{border-color:rgba(255,200,100,0.5);}

#action-bar{
  display:flex;gap:10px;justify-content:center;align-items:center;padding:8px 0;flex-wrap:wrap;
}
.btn{
  padding:10px 24px;border-radius:24px;border:none;cursor:pointer;
  font-size:15px;font-weight:bold;transition:all 0.2s;
  font-family:inherit;letter-spacing:0.5px;
}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn-primary{background:linear-gradient(135deg,#6a3a9a,#8a5aba);color:#fff;box-shadow:0 4px 15px rgba(120,60,180,0.3);}
.btn-primary:hover:not(:disabled){box-shadow:0 6px 20px rgba(120,60,180,0.5);}
.btn-warn{background:linear-gradient(135deg,#9a4a3a,#ba6a5a);color:#fff;box-shadow:0 4px 15px rgba(180,80,60,0.3);}
.btn-success{background:linear-gradient(135deg,#3a7a3a,#5aaa5a);color:#fff;box-shadow:0 4px 15px rgba(60,160,60,0.3);}
.btn-info{background:linear-gradient(135deg,#2a5a8a,#3a7aba);color:#fff;box-shadow:0 4px 15px rgba(60,100,180,0.3);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:16px;}

.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(4px);
}
.modal{
  background:linear-gradient(160deg,#1a1530,#201835);
  border:2px solid rgba(200,180,150,0.3);border-radius:20px;
  padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.modal h3{color:#e8d5a0;margin-bottom:12px;text-align:center;font-size:20px;}
.modal .options{display:flex;flex-direction:column;gap:8px;}
.modal .option{
  padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;cursor:pointer;transition:all 0.2s;color:#d4c8b8;text-align:center;
}
.modal .option:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,215,0,0.5);}
.modal .option.selected{background:rgba(255,215,0,0.15);border-color:#ffd700;color:#ffd700;}
.modal .btn-row{display:flex;gap:10px;justify-content:center;margin-top:12px;}

.orientation-choice{display:flex;gap:12px;justify-content:center;}
.orientation-choice .opt{
  padding:16px 28px;border-radius:14px;cursor:pointer;transition:all 0.25s;
  border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);text-align:center;
}
.orientation-choice .opt:hover{border-color:#ffd700;background:rgba(255,215,0,0.1);}
.orientation-choice .opt .dir{font-size:28px;display:block;margin-bottom:4px;}
.orientation-choice .opt .dir-label{font-size:13px;color:#aaa;}
.orientation-choice .opt .dir-desc{font-size:11px;color:#888;margin-top:4px;max-width:200px;}

.game-over-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(8px);
}
.game-over-panel{
  background:linear-gradient(160deg,#0a0520,#150a30);
  border:3px solid rgba(255,215,0,0.4);border-radius:24px;
  padding:32px;text-align:center;max-width:500px;width:90%;
  box-shadow:0 0 80px rgba(255,215,0,0.2);
}
.game-over-panel h2{font-size:28px;margin-bottom:8px;}
.game-over-panel .winner{font-size:36px;color:#ffd700;margin:12px 0;}
.game-over-panel .detail{font-size:14px;color:#aaa;margin:8px 0;line-height:1.8;}
.game-over-panel .score-table{margin:16px auto;border-collapse:collapse;}
.game-over-panel .score-table td,.game-over-panel .score-table th{
  padding:6px 16px;border:1px solid rgba(255,255,255,0.1);font-size:13px;
}
.game-over-panel .score-table th{color:#e8d5a0;}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:10px 24px;border-radius:20px;color:#fff;font-weight:bold;
  z-index:300;animation:toastIn 0.3s ease-out,toastOut 0.3s 2.2s ease-in forwards;
  font-size:14px;pointer-events:none;
}
.toast.info{background:rgba(60,100,200,0.9);}
.toast.warn{background:rgba(200,120,40,0.9);}
.toast.success{background:rgba(60,160,80,0.9);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

@media(max-width:900px){#battlefield{grid-template-columns:repeat(2,1fr);}}

.elem-wands .player-zone{background:rgba(200,80,40,0.04);}
.elem-cups .player-zone{background:rgba(60,140,200,0.04);}
.elem-swords .player-zone{background:rgba(180,180,100,0.04);}
.elem-pentacles .player-zone{background:rgba(80,160,80,0.04);}

/* 大牌历史区域 */
.majors-history{margin-top:3px;padding-top:3px;border-top:1px dashed rgba(255,215,0,0.15);}
.majors-history .mh-title{font-size:10px;color:rgba(255,215,0,0.6);margin-bottom:2px;}
.majors-history .mh-item{
  display:inline-block;padding:1px 6px;margin:1px 2px;border-radius:4px;
  font-size:10px;cursor:pointer;transition:all 0.2s;
  border:1px solid rgba(255,215,0,0.2);color:#ccc;
}
.majors-history .mh-item:hover{background:rgba(255,215,0,0.15);border-color:#ffd700;}
.majors-history .mh-item.upright{border-left:2px solid #ffd700;}
.majors-history .mh-item.reversed{border-left:2px solid #999;}

/* 大牌详情弹窗 */
.major-detail-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;
  z-index:120;
}
.major-detail-panel{
  background:linear-gradient(160deg,#1a1530,#201835);
  border:2px solid rgba(255,215,0,0.3);border-radius:16px;
  padding:20px 24px;max-width:380px;width:90%;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.major-detail-panel h4{color:#ffd700;margin-bottom:8px;text-align:center;}

/* 正逆位切换按钮 */
.toggle-orient{
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  padding:4px 12px;border-radius:14px;border:1px solid rgba(255,215,0,0.3);
  background:rgba(255,215,0,0.08);color:#e8d5a0;font-size:13px;
  transition:all 0.2s;user-select:none;
}
.toggle-orient:hover{background:rgba(255,215,0,0.18);}
.toggle-orient .arrow{font-size:16px;color:#ffd700;}
.toggle-orient .orient-desc{font-size:11px;color:#aaa;max-width:220px;text-align:left;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ==================== 塔罗对决 v2 - 重写引擎 ====================

const SUITS = ['wands','cups','swords','pentacles'];
const SUIT_NAMES = {wands:'权杖',cups:'圣杯',swords:'宝剑',pentacles:'星币'};
const SUIT_ICONS = {wands:'🪄',cups:'🏆',swords:'⚔️',pentacles:'🪙'};
const RANK_NAMES = {page:'侍从',knight:'骑士',queen:'皇后',king:'国王'};

// === 小阿尔卡纳牌堆 ===
function createMinorDeck(){
  const cards=[];
  for(const suit of SUITS){
    for(let i=1;i<=10;i++){
      cards.push({id:`minor_${suit}_${i}`,type:'minor',subtype:'number',suit,name:`${SUIT_NAMES[suit]}${i}`,points:i,icon:SUIT_ICONS[suit]});
    }
    for(const [rank,label] of Object.entries(RANK_NAMES)){
      cards.push({id:`minor_${suit}_${rank}`,type:'minor',subtype:'court',suit,rank,name:`${label}·${SUIT_NAMES[suit]}`,points:10,icon:SUIT_ICONS[suit]});
    }
  }
  return cards;
}

// === 大阿尔卡那 ===
const MAJOR_DEFS = [
  {id:0,name:'愚人',descU:'双方某阵分数清零',descR:'双方某阵分数互换'},
  {id:1,name:'魔术师',descU:'本回合小牌可加至任意阵',descR:'对方下张小牌须加至不同阵'},
  {id:2,name:'女祭司',descU:'对方某阵分数-10',descR:'双方各选一阵各-5'},
  {id:3,name:'女皇',descU:'己方该阵分数翻倍',descR:'双方该阵分数减半'},
  {id:4,name:'皇帝',descU:'该阵分数锁死2回合',descR:'终局该阵按两阵计算'},
  {id:5,name:'教皇',descU:'该阵+5 另一阵+5',descR:'对方该阵+10 2回合后-20'},
  {id:6,name:'恋人',descU:'己方该阵=己方最高阵',descR:'双方该阵=己方最低阵'},
  {id:7,name:'战车',descU:'该阵免疫分数变化2回合',descR:'该阵禁止加分2回合'},
  {id:8,name:'力量',descU:'己方该阵分数翻倍',descR:'该阵+随机一阵双方翻倍'},
  {id:9,name:'隐士',descU:'下回合夺取对方该阵分数',descR:'该阵+随机阵双方互换'},
  {id:10,name:'命运之轮',descU:'随机加分自选分配',descR:'选择两阵双方减分'},
  {id:11,name:'正义',descU:'双方所有阵=己方该阵',descR:'所有阵落后方分数翻倍'},
  {id:12,name:'倒吊人',descU:'该阵每张小牌+2',descR:'该阵每张小牌-2'},
  {id:13,name:'死神',descU:'清零该阵分配至其他三阵',descR:'该阵分数减半分配至其他阵'},
  {id:14,name:'节制',descU:'对方该阵分数双方平分',descR:'对方下回合不能出该阵小牌'},
  {id:15,name:'恶魔',descU:'该阵每张小牌+5',descR:'任一阵有增益该阵+5'},
  {id:16,name:'塔',descU:'最高分阵双方清零',descR:'双方全部清零'},
  {id:17,name:'星星',descU:'额外抽3张小牌选1打出',descR:'抽1张大牌立即打出(如可)'},
  {id:18,name:'月亮',descU:'背朝上：下回合对方出此阵翻倍',descR:'背朝上：下回合对方未出此阵+10'},
  {id:19,name:'太阳',descU:'选阵双方分数互换',descR:'选阵双方分数取平均'},
  {id:20,name:'审判',descU:'终局该阵胜者得2分',descR:'终局可重判该阵'},
  {id:21,name:'世界',descU:'己方所有阵+10',descR:'双方最高阵-10最低阵+10'},
];

function createMajorDeck(){
  return MAJOR_DEFS.map(d=>({
    id:`major_${d.id}`,type:'major',arcanaId:d.id,name:d.name,
    effectDesc:d.descU,revEffectDesc:d.descR,icon:'🌟'
  }));
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ==================== 游戏状态 ====================
class TarotGame {
  constructor(){
    this.reset();
  }

  reset(){
    this.minorDeck = shuffle(createMinorDeck());  // 56张
    this.majorDeck = shuffle(createMajorDeck());  // 22张
    this.minorDiscard = [];
    this.majorDiscard = [];

    this.currentPlayer = 'A';
    this.totalActions = 0;          // 总行动次数
    this.phase = 'play_minor';      // play_minor | play_major | game_over
    this.drawnMinor = null;         // 当前抽到的小牌
    this.drawnMajor = null;         // 当前抽到的大牌（宫廷牌触发）
    this.majorOrientation = 'upright'; // 大牌正逆位选择
    this.gameOver = false;
    this.logs = [];

    // 玩家数据
    this.players = {
      A:{ elements:{}, flags:{} },
      B:{ elements:{}, flags:{} }
    };
    for(const s of SUITS){
      this.players.A.elements[s] = {cards:[], majors:[], score:0};
      this.players.B.elements[s] = {cards:[], majors:[], score:0};
    }

    // 延迟效果
    this.delayedEffects = [];
    // 终局效果
    this.endGameEffects = [];
    // 月亮牌
    this.moonEffects = [];
  }

  addLog(msg){
    this.logs.push(msg);
    if(this.logs.length>80) this.logs.shift();
  }

  // === 主流程 ===

  /** 开始一个玩家的回合 */
  startTurn(){
    if(this.gameOver) return;
    const p = this.currentPlayer;

    if(this.minorDeck.length === 0){
      this.endGame();
      return;
    }

    this.resolveDelayedEffects();

    // 抽小牌
    this.phase = 'play_minor';
    this.drawnMinor = this.minorDeck.pop();
    this.drawnMajor = null;
    this.majorOrientation = 'upright';
    this.totalActions++;

    const card = this.drawnMinor;
    this.addLog(`${p==='A'?'🔵 玩家A':'🔴 玩家B'} 抽到: ${card.name} (${card.points}点) ${card.subtype==='court'?'👑':''}`);

    // 宫廷牌：立即预览大牌
    if(card.subtype === 'court' && this.majorDeck.length > 0){
      this.drawnMajor = this.majorDeck.pop();
      this.addLog(`  → 预览大牌：${this.drawnMajor.name}`);
    }
  }

  /** 宫廷牌选择目标元素后 */
  courtSelectElement(element){
    const p = this.currentPlayer;
    const card = this.drawnMinor;
    if(!card || card.subtype !== 'court') return false;

    // 打出宫廷牌
    this.playMinorToElement(p, card, element);
    this.addLog(`  → 宫廷牌打入 ${SUIT_NAMES[element]}阵 (+10)`);

    // 大牌已在startTurn中预览抽出
    if(this.drawnMajor){
      this.phase = 'play_major';
      this.majorOrientation = 'upright';
    } else {
      this.endTurn();
    }
    return true;
  }

  /** 大牌决策：打出或弃掉，打出时记录详细效果到该阵历史 */
  majorDecision(play, element=null, orientation=null){
    const p = this.currentPlayer;
    const card = this.drawnMajor;
    if(!card) return false;

    const orient = orientation || this.majorOrientation;

    if(!play){
      this.majorDiscard.push(card);
      this.addLog(`  → 弃掉大牌：${card.name}`);
    } else {
      // 记录效果前快照
      const preScores = {};
      for(const s of SUITS){
        preScores[`A_${s}`] = this.players.A.elements[s].score;
        preScores[`B_${s}`] = this.players.B.elements[s].score;
      }
      this._effectDetail = ''; // 效果细节缓冲区

      // 执行效果
      this.resolveMajorEffect(p, card, element, orient);

      // 生成变化描述
      let detail = this._effectDetail || '';
      if(!detail){
        // 自动生成分数变化
        const parts = [];
        for(const s of SUITS){
          const oldA=preScores[`A_${s}`], newA=this.players.A.elements[s].score;
          const oldB=preScores[`B_${s}`], newB=this.players.B.elements[s].score;
          if(oldA!==newA) parts.push(`A${SUIT_NAMES[s]}:${oldA}→${newA}`);
          if(oldB!==newB) parts.push(`B${SUIT_NAMES[s]}:${oldB}→${newB}`);
        }
        if(parts.length>0) detail=parts.join('，');
      }

      const el = this.players[p].elements[element];
      el.majors.push({
        name: card.name,
        arcanaId: card.arcanaId,
        orientation: orient,
        effectDesc: orient==='upright' ? card.effectDesc : card.revEffectDesc,
        detail: detail,
        turn: this.totalActions
      });
      this.addLog(`  → 打出大牌：${card.name}(${orient==='upright'?'正位':'逆位'}) → ${SUIT_NAMES[element]}阵`);
      this.majorDiscard.push(card);
    }

    this.endTurn();
    return true;
  }

  /** 小牌打到指定元素 */
  playMinorToElement(player, card, element){
    const el = this.players[player].elements[element];
    el.cards.push(card);

    let pts = card.points;

    // 检查战车逆位（禁止加分）
    if(this.hasActiveDelayed(player, element, 'chariot_rev_block')){
      this.addLog(`  ⚠️ 战车逆位：${SUIT_NAMES[element]}阵禁止加分，小牌打为0分`);
      pts = 0;
    }

    // 检查战车正位（免疫）
    if(this.hasActiveDelayed(player, element, 'chariot_immune')){
      this.addLog(`  ⚠️ 战车正位：${SUIT_NAMES[element]}阵免疫，小牌不变分数`);
      // 不影响分数
      return;
    }

    // 检查皇帝正位（锁死）
    if(this.hasActiveDelayed(player, element, 'emperor_lock')){
      this.addLog(`  ⚠️ 皇帝正位：${SUIT_NAMES[element]}阵锁死，分数不变`);
      return;
    }

    // 检查节制逆位（禁打出）
    if(this.hasActiveDelayed(player, element, 'temperance_ban')){
      this.addLog(`  ⚠️ 节制逆位：${player}方不能在${SUIT_NAMES[element]}阵出牌，小牌弃掉`);
      this.minorDiscard.push(card);
      el.cards.pop();
      return;
    }

    // 魔术师正位：可加到其他阵（已由UI选择element处理）
    // 魔术师逆位：必须加到非对应阵（已由UI处理）

    // 节制正位：平分
    const opp = player==='A'?'B':'A';
    if(this.hasActiveDelayed(opp, element, 'temperance_share')){
      const half = Math.ceil(pts/2);
      el.score += half;
      this.players[opp].elements[element].score += half;
      this.addLog(`  ⚖️ 节制平分：双方各得${half}分`);
      return;
    }

    // 倒吊人正/逆位：按小牌数量加减
    if(this.hasActiveDelayed(player, element, 'hanged_bonus')){
      el.score += pts + 2;
      this.addLog(`  🪢 倒吊人：+2额外 → +${pts+2}`);
      return;
    }
    if(this.hasActiveDelayed(player, element, 'hanged_penalty')){
      const newPts = Math.max(0, pts - 2);
      el.score += newPts;
      this.addLog(`  🪢 倒吊人逆位：-2 → +${newPts}`);
      return;
    }

    // 恶魔正位：小牌额外+5
    if(this.hasActiveDelayed(player, element, 'devil_bonus')){
      pts += 5;
      this.addLog(`  😈 恶魔：额外+5 → +${pts}`);
    }

    // 正义逆位：落后翻倍
    if(this.hasActiveDelayed('both','all','justice_rev')){
      if(el.score < this.players[opp].elements[element].score){
        pts *= 2;
        this.addLog(`  ⚖️ 正义逆位：落后方翻倍 → +${pts}`);
      }
    }

    el.score += pts;
  }

  /** 结束当前玩家回合，切换到对方 */
  endTurn(){
    if(this.gameOver) return;

    if(this.minorDeck.length === 0){
      this.endGame();
      return;
    }

    const prev = this.currentPlayer;
    this.currentPlayer = (prev === 'A') ? 'B' : 'A';
    this.phase = 'play_minor';
    this.drawnMinor = null;
    this.drawnMajor = null;

    this.cleanupDelayed();
  }

  // === 延迟效果系统 ===
  hasActiveDelayed(player, element, type){
    return this.delayedEffects.some(e =>
      (e.targetPlayer===player || e.targetPlayer==='both') &&
      (e.element===element || e.element==='all') &&
      e.type===type
    );
  }

  addDelayed(targetPlayer, element, type, duration=1, data={}){
    this.delayedEffects.push({
      targetPlayer, element, type, duration, data,
      created: this.totalActions
    });
  }

  cleanupDelayed(){
    this.delayedEffects = this.delayedEffects.filter(e => {
      e.duration--;
      return e.duration > 0;
    });
  }

  resolveDelayedEffects(){
    // 隐士正位：夺取分数
    const hermitEffs = this.delayedEffects.filter(e => e.type==='hermit_steal' && e.data.triggered);
    for(const eff of hermitEffs){
      const opp = eff.targetPlayer==='A'?'B':'A';
      const stolen = this.players[opp].elements[eff.element].score;
      this.players[eff.targetPlayer].elements[eff.element].score += stolen;
      this.players[opp].elements[eff.element].score = 0;
      this.addLog(`🧙 隐士正位发动：${eff.targetPlayer}方夺取${SUIT_NAMES[eff.element]}阵${stolen}分！`);
    }
    // 移除已触发的
    this.delayedEffects = this.delayedEffects.filter(e => !(e.type==='hermit_steal' && e.data.triggered));

    // 教皇逆位惩罚
    const popePenalties = this.delayedEffects.filter(e => e.type==='hierophant_penalty' && e.data.ready);
    for(const eff of popePenalties){
      const el = this.players[eff.targetPlayer].elements[eff.element];
      el.score = Math.max(0, el.score - 20);
      this.addLog(`⛪ 教皇逆位惩罚：${eff.targetPlayer}方${SUIT_NAMES[eff.element]}阵-20`);
    }
    this.delayedEffects = this.delayedEffects.filter(e => !(e.type==='hierophant_penalty' && e.data.ready));

    // 标记教皇逆位即将触发
    for(const eff of this.delayedEffects){
      if(eff.type==='hierophant_penalty' && !eff.data.ready && !eff.data.marked){
        eff.data.marked = true;
      }
      if(eff.type==='hierophant_penalty' && eff.data.marked && !eff.data.ready){
        eff.data.ready = true;
      }
    }

    // 标记隐士正位触发
    for(const eff of this.delayedEffects){
      if(eff.type==='hermit_steal' && !eff.data.triggered){
        eff.data.triggered = true;
      }
    }

    // 月亮牌结算
    for(const moon of [...this.moonEffects]){
      if(moon.revealAt <= this.totalActions){
        this.resolveMoon(moon);
        this.moonEffects = this.moonEffects.filter(m => m !== moon);
      }
    }
  }

  resolveMoon(moon){
    const opp = moon.owner==='A'?'B':'A';
    // 检查对方上次行动是否在该阵出牌（简化：检查该阵最近是否增加了牌）
    const oppCards = this.players[opp].elements[moon.element].cards;
    const lastCard = oppCards[oppCards.length-1];
    const oppPlayedHere = lastCard && oppCards.length > 0;

    if(moon.orientation === 'upright'){
      if(oppPlayedHere){
        const el = this.players[moon.owner].elements[moon.element];
        const old = el.score;
        el.score *= 2;
        this.addLog(`🌙 月亮正位揭开！对方出了牌→${moon.owner}方${SUIT_NAMES[moon.element]}阵${old}→${el.score}翻倍！`);
      } else {
        const el = this.players[moon.owner].elements[moon.element];
        el.score += 5;
        this.addLog(`🌙 月亮正位揭开！对方未出牌→${moon.owner}方${SUIT_NAMES[moon.element]}阵+5`);
      }
    } else {
      if(!oppPlayedHere){
        const el = this.players[moon.owner].elements[moon.element];
        el.score += 10;
        this.addLog(`🌙 月亮逆位揭开！对方未出牌→${moon.owner}方${SUIT_NAMES[moon.element]}阵+10！`);
      } else {
        const el = this.players[moon.owner].elements[moon.element];
        el.score = Math.max(0, el.score - 3);
        this.addLog(`🌙 月亮逆位揭开！对方出了牌→${moon.owner}方${SUIT_NAMES[moon.element]}阵-3`);
      }
    }
  }

  // === 大阿尔卡那效果结算（全部一次性） ===

    const arcanaId = card.arcanaId;
    const opp = player==='A'?'B':'A';

    if(orientation === 'upright'){
      switch(arcanaId){
        case 0: this.effFoolU(player,element); break;
        case 1: this.effMagicianU(player,element); break;
        case 2: this.effPriestessU(player,element,opp); break;
        case 3: this.effEmpressU(player,element); break;
        case 4: this.effEmperorU(player,element); break;
        case 5: this.effHierophantU(player,element); break;
        case 6: this.effLoversU(player,element); break;
        case 7: this.effChariotU(player,element); break;
        case 8: this.effStrengthU(player,element); break;
        case 9: this.effHermitU(player,element); break;
        case 10: this.effWheelU(player,element); break;

        case 12: this.effHangedU(player,element); break;

        case 19: this.effSunU(player,element); break;
        case 20: this.effJudgementU(player,element); break;
        case 21: this.effWorldU(player,element); break;

    } else {
      switch(arcanaId){

        case 1: this.effMagicianR(player,element,opp); break;
        case 2: this.effPriestessR(player,element); break;
        case 3: this.effEmpressR(player,element); break;
        case 4: this.effEmperorR(player,element); break;
        case 5: this.effHierophantR(player,element,opp); break;
        case 6: this.effLoversR(player,element); break;
        case 7: this.effChariotR(player,element); break;
        case 8: this.effStrengthR(player,element); break;
        case 9: this.effHermitR(player,element); break;
        case 10: this.effWheelR(player,element); break;
        case 11: this.effJusticeR(player,element); break;
        case 12: this.effHangedR(player,element); break;
        case 13: this.effDeathR(player,element); break;
        case 14: this.effTemperanceR(player,element,opp); break;
        case 15: this.effDevilR(player,element); break;
        case 16: this.effTowerR(player,element); break;
        case 17: this.effStarR(player,element); break;
        case 18: this.effMoonR(player,element); break;
        case 19: this.effSunR(player,element); break;
        case 20: this.effJudgementR(player,element); break;
        case 21: this.effWorldR(player,element); break;
      }
    }
  }

  // --- 0 愚人 ---
  effFoolU(p,elem){
    const a=this.players.A.elements[elem].score, b=this.players.B.elements[elem].score;
    this.players.A.elements[elem].score=0; this.players.B.elements[elem].score=0;
    this._effectDetail=`${SUIT_NAMES[elem]}阵清零(A:${a}→0，B:${b}→0)`;
    this.addLog(`🃏 愚人正位：${this._effectDetail}`);
  }
  effFoolR(p,elem){
    const sa=this.players.A.elements[elem].score, sb=this.players.B.elements[elem].score;
    this.players.A.elements[elem].score=sb; this.players.B.elements[elem].score=sa;
    this._effectDetail=`${SUIT_NAMES[elem]}阵互换(A:${sa}↔B:${sb})`;

  effChariotR(p,elem){

  effStrengthU(p,elem){

  effStrengthR(p,elem){

  effHermitR(p,elem){

    const a=this.players.A.elements[elem].score, b=this.players.A.elements[other].score;

    const c=this.players.B.elements[elem].score, d=this.players.B.elements[other].score;

  }
  effJusticeU(p,elem){

    for(const pl of ['A','B']){for(const s of SUITS) this.players[pl].elements[s].score=target;}

  effJusticeR(p,elem){

  effHangedU(p,elem){

    this._effectDetail=`${p}方${SUIT_NAMES[elem]}阵(${count}×2=+${count*2})`;

  effHangedR(p,elem){

  effDeathU(p,elem){

      const half=Math.ceil(el.score/2); el.score-=half;
      const others=SUITS.filter(s=>s!==elem);

      for(const s of others) this.players[pl].elements[s].score += each;

  }
  effTemperanceU(p,elem,opp){
    this.addDelayed(opp,elem,'temperance_share',2);
    this._effectDetail=`对方下回合${SUIT_NAMES[elem]}阵出牌平分`;
    this.addLog(`⚖️ 节制正位：${this._effectDetail}`);
  }
  effTemperanceR(p,elem,opp){
    this.addDelayed(opp,elem,'temperance_ban',2);
    this._effectDetail=`对方下回合禁出${SUIT_NAMES[elem]}阵`;
    this.addLog(`⚖️ 节制逆位：${this._effectDetail}`);
  }
  effDevilU(p,elem){
    const count=this.players[p].elements[elem].cards.length;
    this.players[p].elements[elem].score += count*5;
    this._effectDetail=`${p}方${SUIT_NAMES[elem]}阵(${count}×5=+${count*5})`;
    this.addLog(`😈 恶魔正位：${this._effectDetail}`);
  }
  effDevilR(p,elem){
    this.players[p].elements[elem].score += 5;
    this._effectDetail=`${p}方${SUIT_NAMES[elem]}阵+5`;
    this.addLog(`😈 恶魔逆位：${this._effectDetail}`);
  }
  effTowerU(p,elem){
    let maxS=elem, maxSum=-1;
    for(const s of SUITS){
      const sum=this.players.A.elements[s].score+this.players.B.elements[s].score;
      if(sum>maxSum){maxSum=sum;maxS=s;}
    }
    const a=this.players.A.elements[maxS].score, b=this.players.B.elements[maxS].score;
    this.players.A.elements[maxS].score=0; this.players.B.elements[maxS].score=0;
    this._effectDetail=`最高分阵${SUIT_NAMES[maxS]}清零(A:${a}→0,B:${b}→0)`;
    this.addLog(`🗼 塔正位：${this._effectDetail}`);
  }
  effTowerR(p,elem){
    for(const pl of['A','B']){for(const s of SUITS) this.players[pl].elements[s].score=0;}
    this.delayedEffects=[];
    this._effectDetail=`双方全部清零+效果清除`;
    this.addLog(`🗼 塔逆位：${this._effectDetail}`);
  }
  effStarU(p,elem){
    const drawn=[];
    for(let i=0;i<3;i++){if(this.minorDeck.length>0) drawn.push(this.minorDeck.pop());}
    if(drawn.length>0){
      drawn.sort((a,b)=>b.points-a.points); const pick=drawn[0];
      this.playMinorToElement(p,pick,pick.suit);
      this._effectDetail=`抽${drawn.length}张→选中${pick.name}(+${pick.points}打入${SUIT_NAMES[pick.suit]}阵)`;
      for(const c of drawn.slice(1)) this.minorDiscard.push(c);
    } else {this._effectDetail=`小牌堆已空`;}
    this.addLog(`⭐ 星星正位：${this._effectDetail}`);
  }
  effStarR(p,elem){
    if(this.majorDeck.length>0){
      const mc=this.majorDeck.pop();
      const orient=Math.random()>0.5?'upright':'reversed';
      const target=SUITS[Math.floor(Math.random()*4)];
      this._effectDetail=`抽到${mc.name}→${orient==='upright'?'正位':'逆位'}打入${SUIT_NAMES[target]}阵`;
      this.addLog(`⭐ 星星逆位：${this._effectDetail}`);
      this.resolveMajorEffect(p,mc,target,orient); this.majorDiscard.push(mc);
    }
  }
  effMoonU(p,elem){
    this.moonEffects.push({revealAt:this.totalActions+2,owner:p,element:elem,orientation:'upright'});
    this._effectDetail=`${SUIT_NAMES[elem]}阵：对方出牌则翻倍，未出则+5`;
    this.addLog(`🌙 月亮正位：${this._effectDetail}`);
  }
  effMoonR(p,elem){
    this.moonEffects.push({revealAt:this.totalActions+2,owner:p,element:elem,orientation:'reversed'});
    this._effectDetail=`${SUIT_NAMES[elem]}阵：对方未出则+10，出了则-3`;
    this.addLog(`🌙 月亮逆位：${this._effectDetail}`);
  }
  effSunU(p,elem){
    const a=this.players.A.elements[elem].score, b=this.players.B.elements[elem].score;
    this.players.A.elements[elem].score=b; this.players.B.elements[elem].score=a;
    this._effectDetail=`${SUIT_NAMES[elem]}阵互换(A:${a}↔B:${b})`;
    this.addLog(`☀️ 太阳正位：${this._effectDetail}`);
  }
  effSunR(p,elem){
    const a=this.players.A.elements[elem].score, b=this.players.B.elements[elem].score;
    const avg=Math.ceil((a+b)/2);
    this.players.A.elements[elem].score=avg; this.players.B.elements[elem].score=avg;
    this._effectDetail=`${SUIT_NAMES[elem]}阵取平均→${avg}`;
    this.addLog(`☀️ 太阳逆位：${this._effectDetail}`);
  }
  effJudgementU(p,elem){
    this.endGameEffects.push({owner:p,element:elem,type:'judgement_double'});
    this._effectDetail=`终局${SUIT_NAMES[elem]}阵胜者得2分`;
    this.addLog(`📯 审判正位：${this._effectDetail}`);
  }
  effJudgementR(p,elem){
    this.endGameEffects.push({owner:p,element:elem,type:'judgement_rejudge'});
    this._effectDetail=`终局可重判${SUIT_NAMES[elem]}阵`;
    this.addLog(`📯 审判逆位：${this._effectDetail}`);
  }
  effWorldU(p,elem){
    for(const s of SUITS) this.players[p].elements[s].score += 10;
    this._effectDetail=`${p}方所有阵+10`;
    this.addLog(`🌍 世界正位：${this._effectDetail}`);
  }
  effWorldR(p,elem){
    for(const pl of ['A','B']){
      const scores=SUITS.map(s=>this.players[pl].elements[s].score);
      const maxIdx=scores.indexOf(Math.max(...scores));
      const minIdx=scores.indexOf(Math.min(...scores));
      if(maxIdx!==minIdx){
        this.players[pl].elements[SUITS[maxIdx]].score -= 10;
        this.players[pl].elements[SUITS[minIdx]].score += 10;
      }
    }
    this._effectDetail=`双方最高阵-10，最低阵+10`;
    this.addLog(`🌍 世界逆位：${this._effectDetail}`);
  }

  // === 终局结算 ===
  endGame(){
    this.gameOver = true;
    this.phase = 'game_over';
    this.addLog(`🏆 小牌堆已空，游戏结束！开始结算...`);
  }

  finalScore(){
    const result = {A:0, B:0, totalA:0, totalB:0, details:[]};

    for(const s of SUITS){
      let scoreA = this.players.A.elements[s].score;
      let scoreB = this.players.B.elements[s].score;

      // 皇帝逆位：该阵按两个阵计算
      const empDoubles = this.endGameEffects.filter(e=>e.type==='emperor_double'&&e.element===s);
      for(const eff of empDoubles){
        if(eff.owner==='A') scoreA *= 2;
        if(eff.owner==='B') scoreB *= 2;
      }

      result.totalA += scoreA;
      result.totalB += scoreB;

      let winner = null;
      if(scoreA > scoreB) winner = 'A';
      else if(scoreB > scoreA) winner = 'B';

      // 审判正位：胜者得2分
      const judgeEff = this.endGameEffects.find(e=>e.type==='judgement_double'&&e.element===s);
      const points = (judgeEff && winner) ? 2 : (winner ? 1 : 0);

      if(winner==='A') result.A += points;
      else if(winner==='B') result.B += points;

      result.details.push({element:s, winner, scoreA, scoreB, points});
    }

    return result;
  }

  determineWinner(result){
    if(result.A > result.B) return 'A';
    if(result.B > result.A) return 'B';
    if(result.totalA > result.totalB) return 'A';
    if(result.totalB > result.totalA) return 'B';
    return 'A'; // 先手胜
  }

  // === AI 逻辑（与人类规则相同） ===
  aiAct(){
    const p = 'B';
    if(this.currentPlayer !== 'B' || this.gameOver) return;

    if(this.phase === 'play_minor'){
      // 选择小牌目标元素：数字牌→对应花色，宫廷牌→最低分阵
      const card = this.drawnMinor;
      if(card.subtype === 'number'){
        const target = card.suit;
        this.playMinorToElement(p, card, target);
        this.addLog(`🤖 AI: ${card.name}→${SUIT_NAMES[target]}(+${card.points})`);
        this.endTurn();
      } else {
        // 宫廷牌：选最低分阵
        let target = 'wands', minScore = Infinity;
        for(const s of SUITS){
          if(this.players.B.elements[s].score < minScore){
            minScore = this.players.B.elements[s].score; target = s;
          }
        }
        if(this.hasActiveDelayed('B', target, 'temperance_ban')){
          for(const s of SUITS){
            if(!this.hasActiveDelayed('B', s, 'temperance_ban')){ target = s; break; }
          }
        }
        this.courtSelectElement(target);
        this.addLog(`🤖 AI: 宫廷牌→${SUIT_NAMES[target]}`);
      }
    }

    if(this.phase === 'play_major'){
      const card = this.drawnMajor;
      const play = Math.random() > 0.15;
      if(play){
        const orient = Math.random() > 0.3 ? 'upright' : 'reversed';
        let target = 'wands', maxDiff = -Infinity;
        for(const s of SUITS){
          const diff = this.players.B.elements[s].score - this.players.A.elements[s].score;
          if(diff > maxDiff){ maxDiff=diff; target=s; }
        }
        if(maxDiff < 0) target = SUITS[Math.floor(Math.random()*4)];
        this.majorOrientation = orient;
        this.addLog(`🤖 AI: 打出${card.name}(${orient==='upright'?'正位':'逆位'})→${SUIT_NAMES[target]}`);
        this.majorDecision(true, target, orient);
      } else {
        this.addLog(`🤖 AI: 弃掉${card.name}`);
        this.majorDecision(false);
      }
    }
  }
}

// ==================== UI ====================
let game;

function init(){
  game = new TarotGame();
  game.addLog('🎴 游戏开始！点击元素阵出牌，宫廷牌可任选阵');
  game.addLog('🔵 玩家A先手行动');
  render();
  setTimeout(() => {
    game.startTurn();
    render();
    continueFlow();
  }, 400);
}

function showToast(msg,type='info'){
  const existing=document.querySelector('.toast');
  if(existing)existing.remove();
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

// ====== 核心渲染 ======
function render(){
  const app = document.getElementById('app');
  const cp = game.currentPlayer;
  const isHumanTurn = (cp === 'A' && !game.gameOver);
  const canClick = isHumanTurn && (game.phase==='play_minor' || game.phase==='play_major');

  let html = '';

  // 顶部栏
  html += `<div id="top-bar">
    <div id="round-info">🃏 行动 <span>${game.totalActions}</span> 次</div>
    <div id="phase-info" class="${cp==='A'?'phase-a':'phase-b'}">
      ${cp==='A'?'🔵 玩家A':'🔴 玩家B'} - ${game.phase==='play_minor'?'出小牌':game.phase==='play_major'?'出大牌':'等待中'}
    </div>
    <div id="deck-info">
      <span class="deck-count minor">小:${game.minorDeck.length}</span>
      <span class="deck-count major">大:${game.majorDeck.length}</span>
      <button class="btn btn-sm" style="padding:2px 10px;font-size:11px;background:rgba(255,255,255,0.08);color:#aaa;border:1px solid rgba(255,255,255,0.2);border-radius:8px;" onclick="showLogViewer();event.stopPropagation();">📋 日志</button>
    </div>
  </div>`;

  // 日志
  const recentLogs = game.logs.slice(-3);
  html += `<div id="log-area">${recentLogs.join(' | ') || '点击元素阵出牌...'}</div>`;

  // 战场
  html += `<div id="battlefield">`;
  for(const suit of SUITS){
    let cls = `element-zone elem-${suit}`;
    if(canClick) cls += ' selectable';
    const zoneId = `zone-${suit}`;

    html += `<div class="${cls}" id="${zoneId}" onclick="onElementClick('${suit}')">
      <div class="element-header"><span class="icon">${SUIT_ICONS[suit]}</span>${SUIT_NAMES[suit]}</div>`;

    // 玩家B
    html += `<div class="player-zone player-b">
      <div class="player-label"><span class="dot b"></span>玩家B</div>
      ${renderElementContent('B',suit)}
    </div>`;

    // 玩家A
    html += `<div class="player-zone player-a">
      ${renderElementContent('A',suit)}
      <div class="player-label"><span class="dot a"></span>玩家A</div>
    </div>`;

    html += `</div>`;
  }
  html += `</div>`;

  // 抽牌展示区
  html += renderDrawArea(cp);

  // 按钮区
  html += `<div id="action-bar">`;
  if(game.gameOver){
    html += `<button class="btn btn-primary" onclick="showGameOver()">🏆 查看结算</button>`;
  } else if(isHumanTurn && game.phase==='play_major'){
    html += `<button class="btn btn-warn btn-sm" onclick="onDiscardMajor()">🗑️ 弃掉大牌</button>`;
  }
  html += `<button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#aaa;border:1px solid rgba(255,255,255,0.2);" onclick="init()">🔄 重新开始</button>`;
  html += `</div>`;

  app.innerHTML = html;
}

function renderElementContent(player, suit){
  const el = game.players[player].elements[suit];
  let html = '';

  // 小牌
  html += '<div class="cards-row">';
  for(const c of el.cards.slice(-6)){
    const isCourt = c.subtype==='court';
    html += `<span class="card-mini ${isCourt?'court':''}" title="${c.name}(${c.points}点)">${c.icon}${c.points}</span>`;
  }
  if(el.cards.length>6) html += `<span style="font-size:10px;color:#666;">+${el.cards.length-6}</span>`;
  if(el.cards.length===0) html += `<span style="font-size:10px;color:#444;">-</span>`;
  html += '</div>';

  // 得分
  html += `<div class="score-display"><span class="score-label">得分</span>
    <span class="score-num">${el.score}</span></div>`;

  // 大牌历史
  if(el.majors.length > 0){
    html += `<div class="majors-history"><div class="mh-title">🌟 大牌效果</div>`;
    for(const m of el.majors.slice(-3)){
      const orientCls = m.orientation==='upright'?'upright':'reversed';
      const tip = `${m.name}(${m.orientation==='upright'?'正':'逆'}位)\\n${m.effectDesc}\\n${m.detail||''}`;
      html += `<span class="mh-item ${orientCls}" onclick="event.stopPropagation();showMajorDetail('${player}','${suit}',${el.majors.indexOf(m)})" title="${tip.replace(/"/g,'&quot;')}">${m.name}</span>`;
    }
    if(el.majors.length>3) html += `<span style="font-size:10px;color:#666;">+${el.majors.length-3}</span>`;
    html += `</div>`;
  }

  return html;
}

function renderDrawArea(cp){
  let html = `<div id="draw-area">`;

  if(game.gameOver){
    html += `<div style="font-size:18px;color:#ffd700;">🏆 游戏结束 - 小牌堆已空</div>`;
  } else if(cp === 'B'){
    // AI回合：不展示AI的牌
    html += `<div class="placeholder">🤖 AI思考中...</div>`;
  } else if(game.drawnMinor){
    const card = game.drawnMinor;
    const isCourt = card.subtype==='court';
    let cardCls = isCourt?'court-card':'minor-card';

    // 小牌
    html += `<div class="drawn-card ${cardCls}">
      <div class="card-icon">${card.icon}</div>
      <div>
        <div class="card-name">${card.name}</div>
        <div class="card-detail">${isCourt?'👑宫廷牌':'数字牌'} · ${card.points}点`;
    if(!isCourt){
      html += ` · 仅可打入${SUIT_ICONS[card.suit]}${SUIT_NAMES[card.suit]}阵`;
    }
    html += `</div></div>`;

    if(game.phase==='play_minor'){
      html += `<div style="color:#8ab8e0;font-size:13px;margin-left:8px;">← 点击上方元素阵出牌</div>`;
    }
    html += `</div>`;

    // 大牌预览
    if(game.drawnMajor){
      const mc = game.drawnMajor;
      const orient = game.majorOrientation;
      const desc = orient==='upright' ? mc.effectDesc : mc.revEffectDesc;
      const isPlayable = game.phase==='play_major' && cp==='A';
      html += `<div class="drawn-card major-card" style="flex:1;min-width:240px;">
        <div class="card-icon">🌟</div>
        <div style="flex:1;">
          <div class="card-name" style="color:#ffd700;">${mc.name}</div>
          <div class="card-detail" style="color:#aaa;">${desc}</div>
        </div>`;
      if(game.phase==='play_minor' && isCourt){
        // 宫廷牌还没打出，可预览切换大牌方向
        html += `<div class="toggle-orient" onclick="event.stopPropagation();toggleOrientation()" title="预览正位/逆位效果">
          <span class="arrow">${orient==='upright'?'☀️':'🌑'}</span>
          <span>${orient==='upright'?'正位':'逆位'}</span>
          <span style="font-size:10px;color:#888;">↔预览</span>
        </div>`;
        html += `<div style="color:#ffcc88;font-size:12px;margin-left:4px;">先出宫廷牌→再出大牌</div>`;
      } else if(isPlayable){
        html += `<div class="toggle-orient" onclick="event.stopPropagation();toggleOrientation()" title="点击切换正位/逆位">
          <span class="arrow">${orient==='upright'?'☀️':'🌑'}</span>
          <span>${orient==='upright'?'正位':'逆位'}</span>
          <span style="font-size:10px;color:#888;">↔切换</span>
        </div>`;
        html += `<div style="color:#ffd700;font-size:12px;margin-left:4px;">← 点击元素阵打出大牌</div>`;
      }
      html += `</div>`;
    }
  } else {
    html += `<div class="placeholder">等待抽牌...</div>`;
  }

  html += `</div>`;
  return html;
}

// ====== 交互 ======
function onElementClick(suit){
  if(game.gameOver) return;
  if(game.currentPlayer !== 'A') return;

  if(game.phase === 'play_minor'){
    // 打出小牌
    const card = game.drawnMinor;
    if(!card) return;

    // 数字牌必须打入对应花色阵（除非有魔术师效果）
    if(card.subtype === 'number'){
      if(card.suit !== suit && !game.hasActiveDelayed('A','all','magician_free_play')){
        showToast(`${card.name}只能打入${SUIT_NAMES[card.suit]}阵`,'warn');
        return;
      }
      // 检查魔术师逆位
      if(game.hasActiveDelayed('A','all','magician_force_other') && card.suit === suit){
        showToast(`魔术师逆位：必须打入${SUIT_NAMES[card.suit]}以外的阵`,'warn');
        return;
      }
      game.playMinorToElement('A', card, suit);
      game.addLog(`  → ${card.name}打入${SUIT_NAMES[suit]}阵(+${card.points})`);
      game.endTurn();
      render();
      setTimeout(() => continueFlow(), 400);
      return;
    }

    // 宫廷牌：任意阵
    if(card.subtype === 'court'){
      game.courtSelectElement(suit);
      render();
      if(game.phase === 'play_major'){
        // 大牌已抽出，等待大牌决策
        return;
      } else {
        // 大牌堆空，回合结束
        setTimeout(() => continueFlow(), 400);
        return;
      }
    }
  }

  if(game.phase === 'play_major'){
    // 打出大牌到选中阵
    game.majorDecision(true, suit);
    render();
    setTimeout(() => continueFlow(), 400);
  }
}

function toggleOrientation(){
  game.majorOrientation = game.majorOrientation==='upright'?'reversed':'upright';
  render();
}

function onDiscardMajor(){
  if(game.phase !== 'play_major' || game.currentPlayer !== 'A') return;
  game.majorDecision(false);
  render();
  setTimeout(() => continueFlow(), 400);
}

function showMajorDetail(player, suit, index){
  const majors = game.players[player].elements[suit].majors;
  if(index < 0 || index >= majors.length) return;
  const m = majors[index];
  const overlay = document.createElement('div');
  overlay.className = 'major-detail-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="major-detail-panel">
      <h4>🌟 ${m.name} <span style="font-size:12px;color:${m.orientation==='upright'?'#ffd700':'#999'};">${m.orientation==='upright'?'正位':'逆位'}</span></h4>
      <div style="color:#aaa;font-size:13px;margin-bottom:4px;">${SUIT_ICONS[suit]} ${SUIT_NAMES[suit]}阵 · ${player==='A'?'玩家A':'玩家B'}打出</div>
      <div style="color:#d4c8b8;font-size:14px;line-height:1.6;">效果：${m.effectDesc}</div>
      ${m.detail?`<div style="color:#e8d5a0;font-size:13px;margin-top:4px;line-height:1.4;">详情：${m.detail}</div>`:''}
      <div style="color:#666;font-size:11px;margin-top:8px;">第${m.turn}次行动时打出</div>
      <button class="btn btn-sm" style="margin-top:8px;background:rgba(255,255,255,0.1);color:#aaa;" onclick="this.closest('.major-detail-overlay').remove()">关闭</button>
    </div>`;
  document.body.appendChild(overlay);
}

function showLogViewer(){
  const overlay = document.createElement('div');
  overlay.className = 'major-detail-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  let logHTML = '';
  for(const log of game.logs){
    logHTML += `<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#ccc;">${log}</div>`;
  }
  overlay.innerHTML = `
    <div class="major-detail-panel" style="max-width:600px;max-height:70vh;overflow-y:auto;">
      <h4>📋 出牌日志</h4>
      <div style="margin-bottom:8px;">${logHTML||'暂无记录'}</div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#aaa;" onclick="this.closest('.major-detail-overlay').remove()">关闭</button>
    </div>`;
  document.body.appendChild(overlay);
}

// ====== 流程控制 ======
function continueFlow(){
  if(game.gameOver) {
    showGameOver();
    return;
  }

  if(game.currentPlayer === 'B'){
    runAITurn();
  } else if(game.currentPlayer === 'A'){
    // A的回合刚开始
    if(game.phase === 'play_minor' && !game.drawnMinor){
      game.startTurn();
    }
    render();
    if(game.gameOver){ showGameOver(); return; }
    // 等待用户点击元素出牌
  }
}

function runAITurn(){
  if(game.gameOver) { showGameOver(); return; }

  game.startTurn();
  render();

  if(game.gameOver){ showGameOver(); return; }

  setTimeout(() => {
    // AI出小牌
    game.aiAct();
    render();

    if(game.gameOver){ showGameOver(); return; }

    // AI可能需要出大牌
    if(game.phase === 'play_major' && game.currentPlayer === 'B'){
      setTimeout(() => {
        game.aiAct();
        render();

        if(game.gameOver){ showGameOver(); return; }

        // B回合完成，A开始
        setTimeout(() => {
          if(game.gameOver){ showGameOver(); return; }
          game.startTurn();
          render();

          if(game.gameOver){ showGameOver(); return; }

          // A等用户操作
          if(game.currentPlayer === 'A' && game.phase === 'play_minor'){
            return;
          }
          if(game.currentPlayer === 'B'){
            setTimeout(() => continueFlow(), 400);
          }
        }, 500);
      }, 500);
      return;
    }

    // 无大牌（空堆或数字牌），直接到A
    setTimeout(() => {
      if(game.gameOver){ showGameOver(); return; }
      game.startTurn();
      render();

      if(game.gameOver){ showGameOver(); return; }

      if(game.currentPlayer === 'A' && game.phase === 'play_minor'){
        return;
      }
      if(game.currentPlayer === 'B'){
        setTimeout(() => continueFlow(), 400);
      }
    }, 500);
  }, 500);
}

function showGameOver(){
  const result = game.finalScore();
  const winner = game.determineWinner(result);

  let detailHTML = '';
  for(const d of result.details){
    detailHTML += `<tr>
      <td>${SUIT_ICONS[d.element]} ${SUIT_NAMES[d.element]}</td>
      <td>${d.scoreA}</td><td>${d.scoreB}</td>
      <td>${d.winner==='A'?'🔵A':d.winner==='B'?'🔴B':'平局'}</td>
      <td>${d.points}分</td>
    </tr>`;
  }

  const existOverlay = document.querySelector('.game-over-overlay');
  if(existOverlay) existOverlay.remove();

  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="game-over-panel">
      <h2>🏆 游戏结束</h2>
      <div style="color:#aaa;font-size:13px;">小牌堆已空 · 共${game.totalActions}次行动</div>
      <div class="winner">${winner==='A'?'🔵 玩家A 获胜！':'🔴 玩家B 获胜！'}</div>
      <table class="score-table">
        <tr><th>元素</th><th>A分数</th><th>B分数</th><th>胜者</th><th>得分</th></tr>
        ${detailHTML}
        <tr style="font-weight:bold;color:#ffd700;">
          <td>总计</td><td>${result.totalA}</td><td>${result.totalB}</td>
          <td colspan="2">A:${result.A}分 | B:${result.B}分</td>
        </tr>
      </table>
      ${result.A===result.B?`<div class="detail">⚖️ 得分平局！${result.totalA>result.totalB?'A总点数领先':result.totalB>result.totalA?'B总点数领先':'先手方A获胜'}</div>`:''}
      <button class="btn btn-primary" style="margin-top:16px;" onclick="init();this.closest('.game-over-overlay').remove();">🔄 再来一局</button>
    </div>`;
  document.body.appendChild(overlay);
}
