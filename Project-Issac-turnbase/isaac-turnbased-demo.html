<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以撒半回合制 Demo — AP 行动点数系统</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-cn: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --font-mono: 'VT323', 'Courier New', monospace;
  }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: var(--font-cn);
    overflow-y: auto;
    padding: 16px 16px 24px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    color: #d4b87a;
  }

  /* ===== 顶部标题栏 ===== */
  #top-bar {
    width: 100%;
    max-width: 1000px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  h1 {
    color: #c9a96e;
    font-size: 22px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #000, 0 0 12px rgba(201,169,110,0.4);
    line-height: 1;
    margin: 0;
  }

  #top-status {
    display: flex;
    gap: 8px;
    flex: 1;
    justify-content: center;
    flex-wrap: wrap;
  }
  .status-pill {
    background: #15151a;
    border: 2px solid #3a3020;
    padding: 6px 14px;
    font-size: 16px;
    color: #998866;
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .status-pill .pill-label {
    color: #6b5e44;
    font-size: 13px;
  }
  .status-pill .pill-value { color: #d4b87a; font-size: 16px; }
  #status-phase .pill-value.phase-player  { color: #88ccff; }
  #status-phase .pill-value.phase-shoot   { color: #ff8866; }
  #status-phase .pill-value.phase-exec    { color: #ffcc44; }
  #status-phase .pill-value.phase-monster { color: #ff4444; }

  /* ===== 右上角按钮区 ===== */
  #top-right {
    display: flex;
    gap: 8px;
  }
  .corner-btn {
    background: #15151a;
    border: 2px solid #3a3020;
    color: #998866;
    font-family: var(--font-cn);
    font-size: 14px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .corner-btn:hover { border-color: #6b5e44; color: #d4b87a; }
  #debug-btn.active {
    border-color: #ee6644;
    color: #ff8866;
    box-shadow: 0 0 10px rgba(255,100,60,0.25);
  }
  #help-btn:hover { border-color: #88aaff; color: #aaccff; }

  #game-container {
    position: relative;
    border: 4px solid #3a3020;
    border-radius: 0;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 2px rgba(255,200,100,0.15);
    background: #111;
    line-height: 0;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ===== 调试信息 ===== */
  #debug-info {
    margin-top: 6px;
    min-height: 18px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 16px;
    color: #ffcc44;
    opacity: 0;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #debug-info.visible { opacity: 1; }

  /* ===== 行为序列栏 ===== */
  #action-bar {
    margin-top: 10px;
    min-height: 32px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    max-width: 1000px;
  }
  .action-block {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 10px;
    border: 2px solid #2a2520;
    background: #15151a;
    min-width: 32px;
    height: 30px;
    font-size: 14px;
    font-family: var(--font-cn);
  }
  .action-block.move { border-color: #337799; color: #55aacc; background: #0f1618; }
  .action-block.shoot { border-color: #993333; color: #ee6655; background: #180f0f; }
  .action-bar-placeholder {
    color: #332211;
    font-size: 13px;
    padding: 6px 12px;
  }

  /* ===== 状态面板 (HP/AP/属性) ===== */
  #status-panel {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  #status-row-1, #status-row-2 {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-card {
    background: #1a1410;
    border: 3px solid #5a3a18;
    border-radius: 4px;
    padding: 10px 18px;
    min-width: 180px;
    text-align: center;
  }
  .stat-card .card-label {
    font-size: 14px;
    color: #887755;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  /* HP 心形 */
  .hearts {
    display: flex;
    gap: 4px;
    justify-content: center;
    align-items: center;
  }
  .heart {
    width: 22px; height: 22px;
    position: relative;
  }
  .heart::before, .heart::after {
    content: '';
    position: absolute;
    left: 11px; top: 0;
    width: 11px; height: 16px;
    background: #d43a3a;
    border-radius: 11px 11px 0 0;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
    box-shadow: inset 0 -2px 0 #8a1f1f;
  }
  .heart::after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
  }
  .heart.empty::before, .heart.empty::after {
    background: #3a2020;
    box-shadow: inset 0 -2px 0 #2a1414;
  }
  .heart::after {
    /* 高光点 */
    border-top: 4px solid rgba(255,255,255,0.3);
    border-radius: 11px 11px 0 0;
  }
  .heart .shine {
    position: absolute;
    top: 4px; left: 6px;
    width: 3px; height: 3px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    z-index: 2;
  }

  /* AP 圆点 */
  .ap-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
  }
  .ap-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #443322;
  }
  .ap-dot.full-aap { background: #ff9933; border-color: #aa6622; box-shadow: 0 0 6px rgba(255,153,51,0.4); }
  .ap-dot.full-map { background: #3399ff; border-color: #2266aa; box-shadow: 0 0 6px rgba(51,153,255,0.4); }
  .ap-dot.empty    { background: #1a1410; border-color: #2a2520; box-shadow: none; }

  /* 攻击/射程/运气 三列 */
  .stats-card {
    display: flex;
    gap: 28px;
    align-items: center;
    padding: 10px 28px;
  }
  .stat-cell {
    text-align: center;
    min-width: 60px;
  }
  .stat-cell .cell-label {
    font-size: 14px;
    color: #887755;
    margin-bottom: 6px;
  }
  .stat-cell .cell-value {
    font-size: 22px;
    color: #d4b87a;
    font-family: var(--font-mono);
    line-height: 1;
  }

  /* ===== 操作弹窗 ===== */
  #help-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  #help-modal.open { display: flex; }
  #help-box {
    background: #1a1410;
    border: 4px solid #5a3a18;
    border-radius: 6px;
    padding: 24px 32px;
    max-width: 520px;
    width: 100%;
    color: #d4b87a;
    font-family: var(--font-cn);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
  }
  #help-box h2 {
    color: #ffcc44;
    font-size: 22px;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 2px;
  }
  .help-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 4px;
    border-bottom: 1px dashed #2a2520;
    font-size: 16px;
  }
  .help-row:last-child { border-bottom: none; }
  .help-keys {
    display: flex;
    gap: 4px;
    min-width: 120px;
  }
  .help-key {
    display: inline-block;
    background: #0a0a0f;
    border: 2px solid #5a3a18;
    color: #ffcc44;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 18px;
    line-height: 1;
    min-width: 28px;
    text-align: center;
  }
  .help-desc { color: #998866; }
  .help-note {
    margin-top: 14px;
    padding: 10px 12px;
    background: #0a0a0f;
    border-left: 3px solid #ee6644;
    font-size: 13px;
    color: #998866;
    line-height: 1.6;
  }
  #help-close {
    margin-top: 16px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    background: #5a3a18;
    color: #ffcc44;
    border: 2px solid #ffcc44;
    padding: 6px 22px;
    font-size: 16px;
    font-family: var(--font-cn);
    cursor: pointer;
    letter-spacing: 2px;
  }
  #help-close:hover { background: #ffcc44; color: #1a1410; }

  /* 回合结束确认弹窗 */
  #end-turn-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  #end-turn-modal.open { display: flex; }
  #end-turn-box {
    background: #1a1410;
    border: 4px solid #5a3a18;
    border-radius: 6px;
    padding: 28px 36px;
    max-width: 480px; width: 100%;
    color: #d4b87a;
    font-family: var(--font-cn);
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    text-align: center;
  }
  #end-turn-box h2 { color: #ffcc44; font-size: 20px; margin-bottom: 20px; letter-spacing: 2px; }
  #end-turn-confirm, #end-turn-cancel {
    background: #15151a;
    border: 2px solid #3a3020;
    color: #d4b87a;
    font-family: var(--font-cn);
    font-size: 16px;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #end-turn-confirm:hover { border-color: #88ff66; color: #aaff88; }
  #end-turn-cancel:hover { border-color: #ee6644; color: #ff8866; }

  #spawn-monster-btn { border-color: #aa4444; color: #ff7766; }
  #spawn-monster-btn:hover { border-color: #ff6644; color: #ffaa88; background: #1a1010; }
</style>
</head>
<body>

<div id="top-bar">
  <h1>⚔ 以撒 · 半回合制战斗</h1>
  <div id="top-status">
    <div class="status-pill" id="status-phase">
      <span class="pill-label">阶段</span>
      <span class="pill-value phase-player" id="ui-phase">行为选择</span>
    </div>
    <div class="status-pill" id="status-turn">
      <span class="pill-label">回合</span>
      <span class="pill-value" id="ui-turn">1</span>
    </div>
  </div>
  <div id="top-right">
    <button class="corner-btn" id="debug-btn" title="切换调试模式">调试:关</button>
    <button class="corner-btn" id="help-btn" title="查看操作说明">操作?</button>
    <button class="corner-btn" id="spawn-monster-btn" title="生成怪物">生怪</button>
  </div>
</div>

<div id="game-container">
  <canvas id="game"></canvas>
</div>

<div id="debug-info">
  像素: (<span id="debug-px">0</span>, <span id="debug-py">0</span>)
  &nbsp;网格: (<span id="debug-col">0</span>, <span id="debug-row">0</span>)
</div>

<div id="action-bar">
  <span class="action-bar-placeholder">行为序列</span>
</div>

<div id="status-panel">
  <div id="status-row-1">
    <div class="stat-card">
      <div class="card-label">HP</div>
      <div class="hearts" id="ui-hearts"></div>
    </div>
    <div class="stat-card">
      <div class="card-label">攻击 A-AP</div>
      <div class="ap-dots" id="ui-aap-dots"></div>
    </div>
    <div class="stat-card">
      <div class="card-label">移动 M-AP</div>
      <div class="ap-dots" id="ui-map-dots"></div>
    </div>
  </div>
  <div id="status-row-2">
    <div class="stat-card stats-card">
      <div class="stat-cell">
        <div class="cell-label">攻击力</div>
        <div class="cell-value" id="ui-attack">3.5</div>
      </div>
      <div class="stat-cell">
        <div class="cell-label">射程</div>
        <div class="cell-value" id="ui-range">6</div>
      </div>
      <div class="stat-cell">
        <div class="cell-label">运气</div>
        <div class="cell-value" id="ui-luck">0</div>
      </div>
    </div>
  </div>
</div>

<div id="help-modal">
  <div id="help-box">
    <h2>操作说明</h2>
    <div class="help-row">
      <div class="help-keys"><span class="help-key">W</span><span class="help-key">A</span><span class="help-key">S</span><span class="help-key">D</span></div>
      <div class="help-desc">在可移动范围(浅蓝)内移动本体</div>
    </div>
    <div class="help-row">
      <div class="help-keys"><span class="help-key">↑</span><span class="help-key">↓</span><span class="help-key">←</span><span class="help-key">→</span></div>
      <div class="help-desc">立即射击 (消耗 1 A-AP, 首次锁定位置)</div>
    </div>
    <div class="help-row">
      <div class="help-keys"><span class="help-key">Space</span></div>
      <div class="help-desc">结束回合, 切换到怪物回合</div>
    </div>
    <div class="help-row">
      <div class="help-keys"><span class="help-key">Esc</span></div>
      <div class="help-desc">重置本回合所有操作, 回到回合开始时</div>
    </div>
    <div class="help-note">
      浅蓝色方格 = 可移动范围.<br>
      射击前可自由调整, 射击后锁定位置 (Esc 可全重置).
    </div>
    <button id="help-close">关闭</button>
  </div>
</div>

<div id="end-turn-modal">
  <div id="end-turn-box">
    <h2 id="end-turn-msg" style="text-align:center;font-size:20px;color:#ffcc44;margin-bottom:20px;">是否结束回合？</h2>
    <div style="display:flex;gap:20px;justify-content:center;">
      <button id="end-turn-confirm">Space 确认</button>
      <button id="end-turn-cancel">Esc 取消</button>
    </div>
  </div>
</div>

<script>
// ==================== 渲染配置 ====================
const GAME_W  = 318;
const GAME_H  = 186;
const DISPLAY_SCALE = 3;

// ==================== 画布初始化 ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width  = GAME_W;
canvas.height = GAME_H;
canvas.style.width  = (GAME_W * DISPLAY_SCALE) + 'px';
canvas.style.height = (GAME_H * DISPLAY_SCALE) + 'px';
ctx.imageSmoothingEnabled = false;

// ==================== 精灵图集加载 ====================
const SPRITE = {
  FW: 32, FH: 32,
  img: new Image(),
  loaded: false,
  BASE_SIZE: 24,
  ANIM_SPEED: 0.08,
  HEAD: {
    down:  { normal: [0,0], shooting: [0,1] },
    right: { normal: [0,2], shooting: [0,3] },
    left:  { normal: [0,2], shooting: [0,3] },
    up:    { normal: [0,4], shooting: [0,5] },
  },
  WALK: {
    down:  [[0,6],[0,7],[1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7]],
    right: [[2,0],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],[2,7],[3,0],[3,1]],
  },
  maxFrame(dir) { return (this.WALK[dir] || this.WALK.down).length; },
  needsFlipX(dir) { return dir === 'left'; },
  getWalkDir(dir) {
    if (dir === 'down')  return 'down';
    if (dir === 'right') return 'right';
    if (dir === 'left')  return 'right';
    if (dir === 'up')    return 'down';
    return 'down';
  },
};
SPRITE.img.onload = () => { SPRITE.loaded = true; };
SPRITE.img.src = 'issac-idle.png';

// ==================== 游戏常量 ====================
const CFG = {
  WALL: 16,
  CELL: 22,
  COLS: 13,
  ROWS: 7,
  BULLET_MAX_DIST: 6.0,    // 射程=6
  BULLET_SPEED: 560,       // 翻倍: 280→560
  DECAY_START_BEFORE: 0.2,
  DECAY_SPEED_RATIO: 0.07,
  DECAY_GRAVITY: 1100,     // 翻倍配合子弹速度
  MOVE_SPEED: 140,         // 翻倍: 70→140
  GRAVITY: 360,            // 翻倍配合粒子速度
  SHATTER_PARTICLES: 10,
  SHATTER_DURATION: 0.25,
  VP_SCALE_TOP: 0.90,
  VP_SCALE_BOT: 1.00,
  GHOST_ALPHA: 0.4,
  EXEC_MOVE_SPEED: 170,    // 翻倍: 85→170
};

const WALL  = CFG.WALL;
const CELL  = CFG.CELL;
const COLS  = CFG.COLS;
const ROWS  = CFG.ROWS;
const FLOOR_L = WALL;
const FLOOR_T = WALL;
const FLOOR_R = WALL + COLS * CELL;
const FLOOR_B = WALL + ROWS * CELL;
const VP_CX = (FLOOR_L + FLOOR_R) / 2;
const VP_S  = CFG.VP_SCALE_TOP;
const VP_E  = CFG.VP_SCALE_BOT;

// ==================== 方向常量 ====================
const DIR_VEC = {
  up:    { dx:  0, dy: -1, symbol: '↑' },
  down:  { dx:  0, dy:  1, symbol: '↓' },
  left:  { dx: -1, dy:  0, symbol: '←' },
  right: { dx:  1, dy:  0, symbol: '→' },
};

// ==================== 透视投影 ====================
function vpScale(wy) {
  const t = Math.max(0, Math.min(1, (wy - FLOOR_T) / (FLOOR_B - FLOOR_T)));
  return VP_S + t * (VP_E - VP_S);
}
function project(wx, wy) {
  const s = vpScale(wy);
  return { x: VP_CX + (wx - VP_CX) * s, y: wy, s };
}

// ==================== 坐标转换 ====================
function gridToPixel(col, row) {
  return { x: WALL + col * CELL + CELL / 2, y: WALL + row * CELL + CELL / 2 };
}
function pixelToGrid(px, py) {
  return {
    col: Math.round((px - WALL - CELL / 2) / CELL),
    row: Math.round((py - WALL - CELL / 2) / CELL),
  };
}
function isWall(col, row) {
  return col < 0 || col >= COLS || row < 0 || row >= ROWS;
}
function bulletHitWall(bx, by) {
  const r = 2;
  return bx - r < FLOOR_L || bx + r > FLOOR_R || by - r < FLOOR_T || by + r > FLOOR_B;
}

// ==================== 像素绘制辅助 ====================
function pset(x, y, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
}
function prect(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

// ==================== 玩家属性 ====================
const playerStats = {
  hp: 6,        maxHp: 6,
  moveSpeed: 3,    // 移速 → M-AP上限 = moveSpeed (下限1)
  fireRate: 3,     // 射速 → A-AP上限 = fireRate (下限1)
  attack: 3.5,
  range: 6,
  luck: 0,
};

// ==================== 玩家运行时状态 ====================
const player = {
  col: 6, row: 3,
  facing: 'down',
  px: WALL + 6 * CELL + CELL / 2,
  py: WALL + 3 * CELL + CELL / 2,
  targetPx: null, targetPy: null,
  walkFrame: 0, animTime: 0,
  shootTimer: 0,
  hitFlash: 0,         // 受击白闪
  shakeX: 0, shakeY: 0, // 受击抖动
  invincibleTurns: 0,  // 无敌回合计数
};

// ==================== AP 与回合状态 ====================
let turnState = {
  phase: 'player_select',     // player_select | turn_end_confirm | monster_turn
  mAP: 0, maxMAP: 0,
  aAP: 0, maxAAP: 0,
  hasShot: false,              // 是否已进行过射击(触发checkpoint)
  turnNumber: 1,
  monsterTurnCounter: 0,
  reachableTiles: new Set(),   // 当前可移动方格集 "col,row"
  previewHits: [],             // 保留兼容 (旧渲染引用, 新流程不使用)
};

let bullets       = [];
let particles     = [];
let damageNumbers = [];  // [{x, y, text, life, maxLife, vy}]
let totalShots    = 0;
let checkpointPos = null;       // {col, row} 射击后checkpoint位置
let turnSnapshot  = null;       // 回合开始时完整快照

// ==================== 怪物系统 ====================
const MONSTER_CFG = {
  name: '裂口尸',
  hp: 10,
  SPEED_CYCLE: [2, 1],    // 两回合交替: 2格, 1格
};

let monsters = [];  // [{id, name, col, row, hp, maxHp, predictedPath, moveSpeed}]
let monsterIdCounter = 0;
let monsterFlashTimer = 0;  // 路径箭头闪烁计时器

// ==================== 调试模式 ====================
let debugMode     = false;
let debugMouseX   = -1;       // 鼠标在游戏像素坐标中的 X
let debugMouseY   = -1;       // 鼠标在游戏像素坐标中的 Y
let debugMouseIn  = false;    // 鼠标是否在 canvas 内

// ==================== 回合快照系统 ====================
function saveTurnSnapshot() {
  const sp = gridToPixel(player.col, player.row);
  turnSnapshot = {
    playerCol: player.col, playerRow: player.row,
    playerPx: sp.x, playerPy: sp.y,              // 对齐网格
    playerFacing: player.facing,
    playerHp: playerStats.hp,
    monsters: monsters.map(m => {
      const gp = gridToPixel(m.col, m.row);
      return {
        id: m.id, col: m.col, row: m.row, hp: m.hp, maxHp: m.maxHp,
        px: gp.x, py: gp.y,                      // 对齐网格 (静止状态)
        displayHp: m.displayHp,
        predictedPath: m.predictedPath ? m.predictedPath.map(s => ({ fromCol: s.fromCol, fromRow: s.fromRow, toCol: s.toCol, toRow: s.toRow })) : [],
        moveSpeed: m.moveSpeed,
        hitFlash: m.hitFlash, shakeX: m.shakeX, shakeY: m.shakeY,
      };
    }),
    monsterTurnCounter: turnState.monsterTurnCounter,
  };
}

function restoreTurnSnapshot() {
  if (!turnSnapshot) return;
  const s = turnSnapshot;
  player.col = s.playerCol; player.row = s.playerRow;
  player.px = s.playerPx; player.py = s.playerPy;
  player.facing = s.playerFacing;
  player.targetPx = null; player.targetPy = null;
  player.walkFrame = 0; player.animTime = 0;
  player.shootTimer = 0;
  playerStats.hp = s.playerHp;
  monsters = s.monsters.map(m => ({
    id: m.id, col: m.col, row: m.row, hp: m.hp, maxHp: m.maxHp,
    px: m.px, py: m.py, displayHp: m.displayHp,
    predictedPath: m.predictedPath.map(p => ({ fromCol: p.fromCol, fromRow: p.fromRow, toCol: p.toCol, toRow: p.toRow })),
    moveSpeed: m.moveSpeed,
    hitFlash: 0, shakeX: 0, shakeY: 0,
  }));
  turnState.monsterTurnCounter = s.monsterTurnCounter;
  bullets = [];
  particles = [];
  damageNumbers = [];
  turnSnapshot = null;
  updateHearts();
  updateUI();
}

// ==================== 可移动范围计算 (BFS) ====================
function calcReachableTiles(fromCol, fromRow, maxSteps) {
  const reachable = new Set();
  const visited = new Set();
  const queue = [{ col: fromCol, row: fromRow, steps: 0 }];
  visited.add(`${fromCol},${fromRow}`);
  reachable.add(`${fromCol},${fromRow}`);

  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.steps >= maxSteps) continue;

    for (const dir of ['up', 'down', 'left', 'right']) {
      const nc = cur.col + DIR_VEC[dir].dx;
      const nr = cur.row + DIR_VEC[dir].dy;
      const key = `${nc},${nr}`;
      if (visited.has(key)) continue;
      if (isWall(nc, nr)) continue;
      if (isMonsterAt(nc, nr)) continue;  // 怪物占据的格子不可走

      visited.add(key);
      reachable.add(key);
      queue.push({ col: nc, row: nr, steps: cur.steps + 1 });
    }
  }
  return reachable;
}

// 刷新可移动范围: 从指定位置以指定步数计算
function refreshReachableTiles() {
  turnState.reachableTiles = calcReachableTiles(player.col, player.row, turnState.mAP);
}

// 曼哈顿距离
function manhattanDist(c1, r1, c2, r2) {
  return Math.abs(c1 - c2) + Math.abs(r1 - r2);
}

// 计算移动到(col,row)后的M-AP (距离公式, 支持回原点返还)
function calculateMAPAt(col, row) {
  const originCol = turnSnapshot.playerCol;
  const originRow = turnSnapshot.playerRow;
  const distFromOrigin = manhattanDist(col, row, originCol, originRow);

  if (!turnState.hasShot) {
    // 射击前: 纯距离 = 距起始格曼哈顿距离
    if (distFromOrigin > turnState.maxMAP) return -1;
    return turnState.maxMAP - distFromOrigin;
  } else {
    // 射击后: 总消耗 = 起始→checkpoint + checkpoint→目标
    const toCheckpoint = manhattanDist(checkpointPos.col, checkpointPos.row, originCol, originRow);
    const fromCheckpoint = manhattanDist(col, row, checkpointPos.col, checkpointPos.row);
    const totalCost = toCheckpoint + fromCheckpoint;
    if (totalCost > turnState.maxMAP) return -1;
    return turnState.maxMAP - totalCost;
  }
}

// ==================== 回合AP初始化 ====================
function resetTurnAP() {
  turnState.maxMAP = playerStats.moveSpeed;      // 系数1
  turnState.maxAAP = playerStats.fireRate;        // 系数1
  turnState.mAP = turnState.maxMAP;
  turnState.aAP = turnState.maxAAP;
  turnState.hasShot = false;
  turnState.phase = 'player_select';
  checkpointPos = null;
  turnSnapshot = null;
  calcAllMonsterPaths();
  if (player.invincibleTurns > 0) player.invincibleTurns--;
  turnState.reachableTiles = calcReachableTiles(player.col, player.row, turnState.mAP);
  saveTurnSnapshot();
  updateActionBar();
}

// ==================== 怪物系统辅助 ====================
function isMonsterAt(col, row, excludeId = -1) {
  return monsters.some(m => m.col === col && m.row === row && m.id !== excludeId);
}

// 玩家回合开始时: 所有怪物计算下回合移动路径
function calcAllMonsterPaths() {
  const turnIdx = turnState.monsterTurnCounter;
  const speed = MONSTER_CFG.SPEED_CYCLE[turnIdx % 2];

  for (const m of monsters) {
    m.moveSpeed = speed;
    m.predictedPath = calcMonsterPath(m, player.col, player.row);
  }
}

// 计算怪物向目标移动 speed 格的路径
function calcMonsterPath(monster, targetCol, targetRow) {
  const path = [];
  let col = monster.col, row = monster.row;

  for (let step = 0; step < monster.moveSpeed; step++) {
    const dx = targetCol - col;
    const dy = targetRow - row;
    const adx = Math.abs(dx), ady = Math.abs(dy);

    if (adx === 0 && ady === 0) break;

    // 优先走差值绝对值大的方向; 相等时随机
    let firstDir, secondDir;
    if (adx > ady || (adx === ady && Math.random() < 0.5)) {
      firstDir  = { type:'h', sign:Math.sign(dx), testCol:col+Math.sign(dx), testRow:row };
      secondDir = { type:'v', sign:Math.sign(dy), testCol:col, testRow:row+Math.sign(dy) };
    } else {
      firstDir  = { type:'v', sign:Math.sign(dy), testCol:col, testRow:row+Math.sign(dy) };
      secondDir = { type:'h', sign:Math.sign(dx), testCol:col+Math.sign(dx), testRow:row };
    }

    let moved = false;
    let nc = col, nr = row;

    // 尝试优先方向
    const tryDir = (d) => {
      if (d.sign === 0) return false;
      if (isWall(d.testCol, d.testRow) || isMonsterAt(d.testCol, d.testRow, monster.id)) return false;
      nc = d.testCol; nr = d.testRow; return true;
    };

    if (!tryDir(firstDir)) tryDir(secondDir);

    if (nc === col && nr === row) break; // 无法移动

    path.push({ fromCol: col, fromRow: row, toCol: nc, toRow: nr });
    col = nc; row = nr;
  }
  return path;
}

// ==================== 玩家受伤系统 ====================
function damagePlayer(amount) {
  if (player.invincibleTurns > 0) return; // 无敌中
  playerStats.hp = Math.max(0, playerStats.hp - amount);
  player.hitFlash = 0.12;
  player.shakeX = (Math.random() - 0.5) * 5;
  player.shakeY = (Math.random() - 0.5) * 4;
  player.invincibleTurns = 3;
  updateHearts();
  updateUI();
}

// ==================== 击退/反弹系统 ====================
// 尝试将玩家向 (dx,dy) 方向推1格, 返回是否成功
function tryPushPlayer(pushDx, pushDy) {
  const nx = player.col + pushDx, ny = player.row + pushDy;
  if (!isWall(nx, ny) && !isMonsterAt(nx, ny)) {
    player.col = nx; player.row = ny;
    const t = gridToPixel(nx, ny);
    player.targetPx = t.x; player.targetPy = t.y; player.animTime = 0;
    return true;
  }
  // 主力向不通→尝试两个垂直方向
  const perps = pushDx !== 0
    ? [{dx:0, dy:1}, {dx:0, dy:-1}]
    : [{dx:1, dy:0}, {dx:-1, dy:0}];
  if (Math.random() < 0.5) [perps[0], perps[1]] = [perps[1], perps[0]];
  for (const p of perps) {
    const nx2 = player.col + p.dx, ny2 = player.row + p.dy;
    if (!isWall(nx2, ny2) && !isMonsterAt(nx2, ny2)) {
      player.col = nx2; player.row = ny2;
      const t = gridToPixel(nx2, ny2);
      player.targetPx = t.x; player.targetPy = t.y; player.animTime = 0;
      return true;
    }
  }
  return false; // 所有方向不通
}

// 尝试将怪物向 (dx,dy) 方向推1格, 返回是否成功
function tryPushMonster(monster, pushDx, pushDy) {
  const nx = monster.col + pushDx, ny = monster.row + pushDy;
  if (!isWall(nx, ny) && !isMonsterAt(nx, ny, monster.id) && !(nx === player.col && ny === player.row)) {
    monster.col = nx; monster.row = ny;
    return true;
  }
  const perps = pushDx !== 0
    ? [{dx:0, dy:1}, {dx:0, dy:-1}]
    : [{dx:1, dy:0}, {dx:-1, dy:0}];
  if (Math.random() < 0.5) [perps[0], perps[1]] = [perps[1], perps[0]];
  for (const p of perps) {
    const nx2 = monster.col + p.dx, ny2 = monster.row + p.dy;
    if (!isWall(nx2, ny2) && !isMonsterAt(nx2, ny2, monster.id) && !(nx2 === player.col && ny2 === player.row)) {
      monster.col = nx2; monster.row = ny2;
      return true;
    }
  }
  return false;
}

// 怪物回合执行
let monsterExecTimer = 0;
let monsterExecStepIdx = 0;

function startMonsterTurn() {
  monsterExecStepIdx = 0;
  monsterExecTimer = 0;
  // 保留 predictedPath 用于实际移动执行
}

function updateMonsterTurn(dt) {
  if (monsters.length === 0) { finishMonsterTurn(); return; }

  monsterExecTimer += dt;
  if (monsterExecTimer < 0.15) return; // 加速: 0.25→0.15
  monsterExecTimer = 0;

  // ===== 所有怪物同时执行当前步骤 =====
  // 第一遍：计算所有怪物拟移动的目标位置，检测冲突
  const planned = []; // [{monster, toCol, toRow}]
  let anyStepLeft = false;

  for (const m of monsters) {
    if (!m.predictedPath || monsterExecStepIdx >= m.predictedPath.length) continue;
    anyStepLeft = true;
    const step = m.predictedPath[monsterExecStepIdx];
    planned.push({ monster: m, toCol: step.toCol, toRow: step.toRow });
  }

  if (!anyStepLeft) { finishMonsterTurn(); return; }

  // 第二遍：应用移动 (已占用的格子不能再被其他怪物占据)
  const occupied = new Set();
  // 把玩家和静止怪物当前位置标记为占用(移动后腾出)
  for (const m of monsters) occupied.add(`${m.col},${m.row}`);

  // 先标记起始位置 (避免怪物踩到另一个怪物的起点)

  for (const p of planned) {
    const key = `${p.toCol},${p.toRow}`;
    const m = p.monster;

    // 检查目标格是否有其他怪物(也在本步移动中)早到
    if (occupied.has(key)) {
      continue; // 被挡住, 不动
    }

    // 检查玩家位置 (碰撞 → 伤害, 按怪物移动方向击退玩家, 失败则怪物反弹)
    if (p.toCol === player.col && p.toRow === player.row) {
      damagePlayer(1);
      const step = m.predictedPath[monsterExecStepIdx];
      const pushDx = step.toCol - step.fromCol;
      const pushDy = step.toRow - step.fromRow;
      if (!tryPushPlayer(pushDx, pushDy)) {
        m.col = step.fromCol; m.row = step.toRow;
      }
      continue;
    }

    // 可以移动
    m.col = p.toCol;
    m.row = p.toRow;
    occupied.add(key);
  }

  monsterExecStepIdx++;

  // 检查是否全部完成
  let maxSteps = 0;
  for (const m of monsters) {
    if (m.predictedPath) maxSteps = Math.max(maxSteps, m.predictedPath.length);
  }
  if (monsterExecStepIdx >= maxSteps) finishMonsterTurn();
}

function finishMonsterTurn() {
  for (const m of monsters) m.predictedPath = [];
  turnState.monsterTurnCounter++;
  turnState.turnNumber++;
  monsterExecTimer = 0;
  monsterExecStepIdx = 0;
  resetTurnAP();
  updateUI();
}

// ==================== 渲染系统 ====================

// --- 墙壁 ---
function drawWalls() {
  prect(0, 0, GAME_W, GAME_H, '#1a1815');
  const stones = ['#343028', '#383226', '#302c24', '#362e24', '#3a3228', '#2e2a22'];
  for (let rx = 0; rx < GAME_W; rx += 4) {
    for (let ry = 0; ry < WALL; ry += 4) {
      const ci = (Math.floor(rx / 4) + Math.floor(ry / 4)) % stones.length;
      prect(rx, ry, 4, 4, stones[ci]);
      if (Math.floor(rx / 4) % 3 === 0) prect(rx, ry, 1, 4, '#1a1612');
      if (Math.floor(ry / 4) % 3 === 0) prect(rx, ry, 4, 1, '#1a1612');
    }
  }
  for (let rx = 0; rx < GAME_W; rx += 4) {
    for (let ry = FLOOR_B; ry < GAME_H; ry += 4) {
      const ci = (Math.floor(rx / 4) + Math.floor(ry / 4) + 3) % stones.length;
      prect(rx, ry, 4, 4, stones[ci]);
      if (Math.floor(rx / 4) % 3 === 0) prect(rx, ry, 1, 4, '#1a1612');
      if (Math.floor(ry / 4) % 3 === 0) prect(rx, ry, 4, 1, '#1a1612');
    }
  }
  for (let rx = 0; rx < WALL; rx += 4) {
    for (let ry = 0; ry < GAME_H; ry += 4) {
      const ci = (Math.floor(rx / 4) + Math.floor(ry / 4) + 1) % stones.length;
      prect(rx, ry, 4, 4, stones[ci]);
      if (Math.floor(rx / 4) % 2 === 0) prect(rx, ry, 1, 4, '#1a1612');
      if (Math.floor(ry / 4) % 3 === 0) prect(rx, ry, 4, 1, '#1a1612');
    }
  }
  for (let rx = FLOOR_R; rx < GAME_W; rx += 4) {
    for (let ry = 0; ry < GAME_H; ry += 4) {
      const ci = (Math.floor(rx / 4) + Math.floor(ry / 4) + 2) % stones.length;
      prect(rx, ry, 4, 4, stones[ci]);
      if (Math.floor(rx / 4) % 2 === 0) prect(rx, ry, 1, 4, '#1a1612');
      if (Math.floor(ry / 4) % 3 === 0) prect(rx, ry, 4, 1, '#1a1612');
    }
  }
  const ptTL = project(FLOOR_L, FLOOR_T);
  const ptTR = project(FLOOR_R, FLOOR_T);
  const ptBL = project(FLOOR_L, FLOOR_B);
  const ptBR = project(FLOOR_R, FLOOR_B);
  ctx.strokeStyle = '#5a4d3a'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ptTL.x, ptTL.y); ctx.lineTo(ptTR.x, ptTR.y);
  ctx.lineTo(ptBR.x, ptBR.y); ctx.lineTo(ptBL.x, ptBL.y);
  ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = '#1a1510';
  ctx.strokeRect(FLOOR_L + 1, FLOOR_T + 1, FLOOR_R - FLOOR_L - 2, FLOOR_B - FLOOR_T - 2);
}

// --- 地板 ---
function drawFloor() {
  prect(FLOOR_L, FLOOR_T, FLOOR_R - FLOOR_L, FLOOR_B - FLOOR_T, '#2a2520');
  for (let row = 0; row < ROWS; row++) {
    const yTop = FLOOR_T + row * CELL;
    const yBot = FLOOR_T + (row + 1) * CELL;
    for (let col = 0; col < COLS; col++) {
      const xL = FLOOR_L + col * CELL;
      const xR = FLOOR_L + (col + 1) * CELL;
      const tl = project(xL, yTop); const tr = project(xR, yTop);
      const bl = project(xL, yBot); const br = project(xR, yBot);
      const shade = ((col + row) % 2 === 0) ? '#2e2822' : '#27231e';
      ctx.fillStyle = shade;
      ctx.beginPath();
      ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
      ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
      ctx.closePath(); ctx.fill();
      const shade2 = ((col + row) % 2 === 0) ? '#322c26' : '#2b2620';
      const inset = 3;
      const itl = project(xL + inset, yTop + inset);
      const itr = project(xR - inset, yTop + inset);
      const ibl = project(xL + inset, yBot - inset);
      const ibr = project(xR - inset, yBot - inset);
      ctx.fillStyle = shade2;
      ctx.beginPath();
      ctx.moveTo(itl.x, itl.y); ctx.lineTo(itr.x, itr.y);
      ctx.lineTo(ibr.x, ibr.y); ctx.lineTo(ibl.x, ibl.y);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.strokeStyle = '#1f1b17'; ctx.lineWidth = 1;
  for (let col = 1; col < COLS; col++) {
    const x = FLOOR_L + col * CELL;
    const ptTop = project(x, FLOOR_T); const ptBot = project(x, FLOOR_B);
    ctx.beginPath(); ctx.moveTo(ptTop.x, ptTop.y); ctx.lineTo(ptBot.x, ptBot.y); ctx.stroke();
  }
  for (let row = 1; row < ROWS; row++) {
    const y = FLOOR_T + row * CELL;
    const ptL = project(FLOOR_L, y); const ptR = project(FLOOR_R, y);
    ctx.beginPath(); ctx.moveTo(ptL.x, ptL.y); ctx.lineTo(ptR.x, ptR.y); ctx.stroke();
  }
  const cornerMark = (wx, wy, dx, dy) => {
    const p = project(wx, wy); const s = p.s;
    const len = Math.round(4 * s);
    prect(p.x + dx, p.y + dy, len, 1, 'rgba(255,200,100,0.6)');
    prect(p.x + dx, p.y + dy, 1, len, 'rgba(255,200,100,0.6)');
  };
  cornerMark(FLOOR_L + 2, FLOOR_T + 2, 0, 0);
  cornerMark(FLOOR_R - 2, FLOOR_T + 2, -4, 0);
  cornerMark(FLOOR_L + 2, FLOOR_B - 2, 0, -4);
  cornerMark(FLOOR_R - 2, FLOOR_B - 2, -4, -4);
}

// --- 网格高亮 ---
function drawGridHighlight() {
  const { col, row } = player;
  const xL = FLOOR_L + col * CELL, xR = FLOOR_L + (col + 1) * CELL;
  const yT = FLOOR_T + row * CELL, yB = FLOOR_T + (row + 1) * CELL;
  const tl = project(xL, yT), tr = project(xR, yT);
  const bl = project(xL, yB), br = project(xR, yB);
  ctx.strokeStyle = 'rgba(255,200,100,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
  ctx.closePath(); ctx.stroke();
  const s = vpScale((yT + yB) / 2);
  const cSize = Math.max(2, Math.round(3 * s));
  const c = 'rgba(255,200,100,0.6)';
  prect(Math.round(tl.x + 1), Math.round(tl.y + 1), cSize, 1, c);
  prect(Math.round(tl.x + 1), Math.round(tl.y + 1), 1, cSize, c);
  prect(Math.round(tr.x - 1 - cSize), Math.round(tr.y + 1), cSize, 1, c);
  prect(Math.round(tr.x - 1), Math.round(tr.y + 1), 1, cSize, c);
  prect(Math.round(bl.x + 1), Math.round(bl.y - 1 - cSize), cSize, 1, c);
  prect(Math.round(bl.x + 1), Math.round(bl.y - 1), 1, cSize, c);
  prect(Math.round(br.x - 1 - cSize), Math.round(br.y - 1 - cSize), cSize, 1, c);
  prect(Math.round(br.x - 1), Math.round(br.y - 1), 1, cSize, c);
}

// --- 地面移动箭头 (40%透明度) ---
function drawMoveArrows() {
  if (turnState.phase !== 'player_select' && turnState.phase !== 'player_shoot_dir') return;
  const arrows = calcMoveArrows();
  if (arrows.length === 0) return;
  ctx.save();
  ctx.globalAlpha = CFG.GHOST_ALPHA;

  for (const arr of arrows) {
    const fromPx = gridToPixel(arr.fromCol, arr.fromRow);
    const toPx   = gridToPixel(arr.toCol, arr.toRow);
    const fp = project(fromPx.x, fromPx.y);
    const tp = project(toPx.x, toPx.y);
    const dx = tp.x - fp.x;
    const dy = tp.y - fp.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) continue;
    const ux = dx / len, uy = dy / len;

    // 画箭头线 (粗像素)
    const s = fp.s;
    const thick = Math.max(2, Math.round(3 * s));
    const headLen = Math.max(4, Math.round(5 * s));

    // 主线
    const startX = fp.x + ux * (CELL * 0.18 * fp.s);
    const endX = tp.x - ux * (headLen);
    const startY = fp.y + uy * (CELL * 0.18 * fp.s);
    const endY = tp.y - uy * (headLen);

    // 粗线
    for (let i = -Math.floor(thick / 2); i <= Math.floor(thick / 2); i++) {
      const px = uy * i;
      const py = -ux * i;
      ctx.strokeStyle = '#ffcc44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.round(startX + px), Math.round(startY + py));
      ctx.lineTo(Math.round(endX + px), Math.round(endY + py));
      ctx.stroke();
    }

    // 箭头尖端 (三角)
    ctx.fillStyle = '#ffcc44';
    const tipX = tp.x - ux * (CELL * 0.06 * fp.s);
    const tipY = tp.y - uy * (CELL * 0.06 * fp.s);
    ctx.beginPath();
    ctx.moveTo(Math.round(tipX), Math.round(tipY));
    ctx.lineTo(Math.round(endX + uy * headLen * 0.5), Math.round(endY - ux * headLen * 0.5));
    ctx.lineTo(Math.round(endX - uy * headLen * 0.5), Math.round(endY + ux * headLen * 0.5));
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

// --- 射击预览 (队列所有射击 + 当前方向选择) ---
function drawShootPreview() {
  // 执行阶段不显示预览线
  if (turnState.phase === 'player_execute' || turnState.phase === 'monster_turn') return;
  turnState.previewHits = [];
  // 累计：先算队列中所有射击的命中
  const previews = getShootPreviews();
  for (const pv of previews) {
    drawShootLine(pv.origin.col, pv.origin.row, pv.dir, 0.3);
    accumulateHits(pv.origin.col, pv.origin.row, pv.dir);
  }

  // 当前方向选择
  if (turnState.phase === 'player_shoot_dir' && turnState.pendingShootDir) {
    const ghost = calcGhostPos();
    drawShootLine(ghost.col, ghost.row, turnState.pendingShootDir, 0.5);
    accumulateHits(ghost.col, ghost.row, turnState.pendingShootDir);
  }
}

// 累加子弹命中结果到 turnState.previewHits
function accumulateHits(originCol, originRow, dir) {
  const vec = DIR_VEC[dir];
  let cx = originCol, cy = originRow;
  for (let step = 0; step < CFG.BULLET_MAX_DIST; step++) {
    cx += vec.dx; cy += vec.dy;
    if (isWall(cx, cy)) break;
    for (const m of monsters) {
      if (m.col === cx && m.row === cy) {
        const existing = turnState.previewHits.find(h => h.monster.id === m.id);
        const dmg = playerStats.attack;
        if (existing) {
          existing.dmg += dmg;
          existing.lethal = m.hp <= existing.dmg;
        } else {
          turnState.previewHits.push({ monster: m, dmg, lethal: m.hp <= dmg });
        }
        return; // 子弹被怪物阻挡
      }
    }
  }
}

function drawShootLine(originCol, originRow, dir, alpha) {
  const vec = DIR_VEC[dir];
  const gp = gridToPixel(originCol, originRow);
  const pp = project(gp.x, gp.y);
  const s = pp.s;
  const lineLen = CFG.BULLET_MAX_DIST * CELL * s;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#ff6644';
  ctx.lineWidth = Math.max(1, Math.round(1.5 * s));
  ctx.setLineDash([4 * s, 3 * s]);
  ctx.beginPath();
  ctx.moveTo(Math.round(pp.x), Math.round(pp.y));
  ctx.lineTo(Math.round(pp.x + vec.dx * lineLen), Math.round(pp.y + vec.dy * lineLen));
  ctx.stroke();
  ctx.setLineDash([]);

  // 终点碎裂光点 (半透明)
  const endPx = pp.x + vec.dx * lineLen;
  const endPy = pp.y + vec.dy * lineLen;
  ctx.fillStyle = '#ff6644';
  prect(Math.round(endPx) - 2, Math.round(endPy) - 2, 5, 5, 'rgba(255,100,60,0.5)');
  prect(Math.round(endPx) - 1, Math.round(endPy) - 1, 3, 3, 'rgba(255,180,100,0.7)');
  ctx.restore();
}

// --- 角色渲染 (通用，支持透明度参数) ---
function drawCharacterAt(px, py, facing, walkFrame, shootTimer, alpha) {
  if (alpha === undefined) alpha = 1;

  const pp = project(px, py);
  const cx = Math.round(pp.x), cy = Math.round(pp.y);
  const s = pp.s;
  const vec = DIR_VEC[facing];
  const size = Math.round(SPRITE.BASE_SIZE * s);
  const half = Math.floor(size / 2);
  const drawX = cx - half, drawY = cy - half;

  // 阴影
  const shadowW = Math.round(size * 0.7);
  const shadowH = Math.max(1, Math.round(3 * s));
  ctx.save();
  ctx.globalAlpha = alpha * 0.55;
  prect(cx - Math.floor(shadowW / 2), cy + half - 2, shadowW, shadowH, 'rgba(0,0,0,0.55)');
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = alpha;

  if (!SPRITE.loaded) {
    prect(cx - half + 1, cy - half + 2, size - 2, size - 4, '#5a8a9e');
    prect(cx - half + 1, cy - half, size - 2, Math.round(size * 0.38), '#7aaab8');
  } else {
    const walkDir = SPRITE.getWalkDir(facing);
    const frames = SPRITE.WALK[walkDir];
    const fi = Math.min(walkFrame, frames.length - 1);
    const [bodyRow, bodyCol] = frames[fi];
    const bodySX = bodyCol * SPRITE.FW;
    const bodySY = bodyRow * SPRITE.FH;

    const headInfo = SPRITE.HEAD[facing];
    const headState = shootTimer > 0 ? 'shooting' : 'normal';
    const [headRow, headCol] = headInfo[headState];
    const headSX = headCol * SPRITE.FW;
    const headSY = headRow * SPRITE.FH;
    const headY = drawY - Math.round(size * 0.30);

    if (SPRITE.needsFlipX(facing)) {
      ctx.save();
      ctx.translate(cx + half, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(SPRITE.img, bodySX, bodySY, SPRITE.FW, SPRITE.FH, 0, drawY, size, size);
      ctx.drawImage(SPRITE.img, headSX, headSY, SPRITE.FW, SPRITE.FH, 0, headY, size, size);
      ctx.restore();
    } else {
      ctx.drawImage(SPRITE.img, bodySX, bodySY, SPRITE.FW, SPRITE.FH, drawX, drawY, size, size);
      ctx.drawImage(SPRITE.img, headSX, headSY, SPRITE.FW, SPRITE.FH, drawX, headY, size, size);
    }
  }

  // 方向三角
  const triSize = Math.max(2, Math.round(3 * s));
  const triDist = Math.round(half * 1.1);
  const tx = cx + vec.dx * triDist;
  const ty = cy + vec.dy * triDist;
  prect(tx, ty, 1, 1, '#ffcc88');
  for (let i = 1; i <= triSize; i++) {
    prect(tx + vec.dx * (-i) + vec.dy * i, ty + vec.dy * (-i) - vec.dx * i, 1, 1, '#ffcc88');
    prect(tx + vec.dx * (-i) - vec.dy * i, ty + vec.dy * (-i) + vec.dx * i, 1, 1, '#ffcc88');
  }

  ctx.restore();
}

// --- 幽灵复制体 (40%透明度) ---
function drawGhost() {
  if (turnState.phase !== 'player_select' && turnState.phase !== 'player_shoot_dir') return;
  const ghost = calcGhostPos();
  if (ghost.col === player.col && ghost.row === player.row) return;
  const gp = gridToPixel(ghost.col, ghost.row);
  // 幽灵朝向：队列最后一个移动的方向
  let ghostFacing = player.facing;
  const lastMove = [...turnState.actionQueue].reverse().find(a => a.type === 'move');
  if (lastMove) ghostFacing = lastMove.dir;
  drawCharacterAt(gp.x, gp.y, ghostFacing, 0, 0, CFG.GHOST_ALPHA);

  // 幽灵坐标标签
  const gpp = project(gp.x, gp.y);
  const s = gpp.s;
  ctx.save();
  ctx.globalAlpha = CFG.GHOST_ALPHA;
  ctx.fillStyle = '#ffcc88';
  ctx.font = `${Math.max(5, Math.round(6 * s))}px 'Press Start 2P'`;
  ctx.textAlign = 'center';
  ctx.fillText(`(${ghost.col},${ghost.row})`, Math.round(gpp.x), Math.round(gpp.y - SPRITE.BASE_SIZE * s * 0.5 - 6 * s));
  ctx.restore();
}

// --- 玩家渲染 ---
function drawPlayer() {
  // 无敌闪烁
  let alpha = 1;
  if (player.invincibleTurns > 0) {
    alpha = 0.3 + 0.35 * Math.sin(performance.now() * 0.015);
  }
  // 抖动偏移
  const sx = player.hitFlash > 0 ? player.shakeX : 0;
  const sy = player.hitFlash > 0 ? player.shakeY : 0;

  if (alpha < 0.05) return; // 闪烁全透明时跳过渲染

  drawCharacterAt(player.px + sx, player.py + sy, player.facing, player.walkFrame, player.shootTimer, alpha);

  // 受击白闪
  if (player.hitFlash > 0 && player.invincibleTurns <= 0) {
    const pp = project(player.px + sx, player.py + sy);
    const s = pp.s;
    const size = Math.round(SPRITE.BASE_SIZE * s);
    const half = Math.floor(size / 2);
    ctx.save();
    ctx.globalAlpha = player.hitFlash * 5;
    prect(Math.round(pp.x) - half, Math.round(pp.y) - half, size, size, '#ffffff');
    ctx.restore();
  }
}

// --- 像素风子弹 ---
function drawBullets() {
  for (const b of bullets) {
    if (b.phase === 'dying') continue;
    const bp = project(b.x, b.y);
    const bx = Math.round(bp.x), by = Math.round(bp.y + b.vOff);
    const s = bp.s;
    const size = Math.max(1, Math.round(2 * s));
    prect(bx - size * 2, by - size * 2, size * 4, size * 4, 'rgba(255,200,60,0.35)');
    prect(bx - size, by - size, size * 2, size * 2, 'rgba(255,220,100,0.55)');
    prect(bx - Math.floor(size / 2), by - Math.floor(size / 2), size, size, '#ffeebb');
    prect(bx - Math.floor(size / 2), by - Math.floor(size / 2), 1, 1, '#ffffff');
    if (b.distTraveled > 2) {
      const tx = bx - b.dirX * Math.round(3 * s);
      const ty = by - b.dirY * Math.round(3 * s);
      prect(tx, ty, 1, 1, 'rgba(255,200,80,0.5)');
      const tx2 = bx - b.dirX * Math.round(5 * s);
      const ty2 = by - b.dirY * Math.round(5 * s);
      prect(tx2, ty2, 1, 1, 'rgba(255,180,60,0.3)');
    }
  }
}

// --- 像素风粒子 ---
function drawParticles() {
  for (const p of particles) {
    const pp = project(p.x, p.y);
    const alpha = Math.max(0, p.life / p.maxLife);
    const s = pp.s;
    const sz = Math.max(1, Math.round(p.size * alpha * s));
    ctx.globalAlpha = alpha;
    prect(Math.round(pp.x) - sz, Math.round(pp.y) - sz, sz * 2, sz * 2, p.color);
    if (alpha > 0.4) {
      ctx.globalAlpha = alpha * 0.6;
      prect(Math.round(pp.x), Math.round(pp.y), 1, 1,
        p.color === '#ffdd88' ? '#ffffdd' : '#ffddaa');
    }
    ctx.globalAlpha = 1;
  }
}

// --- 主渲染 ---
function render() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  drawWalls();
  drawFloor();
  drawGridHighlight();
  drawReachableOverlay();   // 可移动方格 (浅蓝呼吸)
  drawMonsterDangerZones(); // 怪物路径红色呼吸方格
  drawMonsterPaths();       // 怪物路径预览 (红色闪烁)
  drawBullets();
  drawParticles();
  drawMonsters();
  drawTurnStartGhost();     // 回合开始位置幽灵
  drawPlayer();
  drawDamageNumbers();
  drawDebugOverlay();
}

// ==================== 怪物渲染 ====================
// 怪物平滑动画插值
const MONSTER_ANIM_SPEED = 170; // px/s
function animateMonsters(dt) {
  for (const m of monsters) {
    const target = gridToPixel(m.col, m.row);
    const dx = target.x - m.px, dy = target.y - m.py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) {
      m.px = target.x; m.py = target.y;
    } else {
      const step = MONSTER_ANIM_SPEED * dt;
      const r = Math.min(step / dist, 1);
      m.px += dx * r; m.py += dy * r;
    }
  }
}

// 伤害飘字
function updateDamageNumbers(dt) {
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.life -= dt;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
}
function drawDamageNumbers() {
  for (const d of damageNumbers) {
    const pp = project(d.x, d.y);
    const alpha = Math.max(0, d.life / d.maxLife);
    const s = pp.s;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffdd44';
    ctx.font = `bold ${Math.max(8, Math.round(10 * s))}px VT323, monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(d.text, Math.round(pp.x), Math.round(pp.y));
    ctx.restore();
  }
}
function drawMonsters() {
  for (const m of monsters) {
    // 血条动画: displayHp 平滑追赶真实 hp
    if (m.displayHp !== m.hp) {
      const diff = m.hp - m.displayHp;
      if (Math.abs(diff) < 0.05) { m.displayHp = m.hp; }
      else { m.displayHp += diff * 0.08; }
    }

    // 抖动偏移 (渐弱)
    if (m.hitFlash > 0) {
      m.shakeX *= 0.85; m.shakeY *= 0.85;
    }

    const pp = project(m.px + m.shakeX, m.py + m.shakeY);
    const cx = Math.round(pp.x), cy = Math.round(pp.y);
    const s = pp.s;
    const size = Math.round(SPRITE.BASE_SIZE * s * 1.1);
    const half = Math.floor(size / 2);

    // --- HP 条 ---
    const barW = Math.max(16, Math.round(size * 1.0));
    const barH = Math.max(3, Math.round(5 * s));
    const barY = cy - half - Math.round(9 * s);
    const barX = cx - Math.floor(barW / 2);
    const displayRatio = Math.max(0, m.displayHp / m.maxHp);
    const realRatio = Math.max(0, m.hp / m.maxHp);
    // 黑色槽
    prect(barX, barY, barW, barH, '#111');
    prect(barX + 1, barY + 1, barW - 2, barH - 2, '#222');
    // 红色填充 (displayHp)
    const fillW = Math.max(0, Math.round((barW - 2) * displayRatio));
    if (fillW > 0) {
      prect(barX + 1, barY + 1, fillW, barH - 2, '#cc3333');
      prect(barX + 1, barY + 1, fillW, Math.max(1, Math.floor(barH * 0.35)), 'rgba(255,150,150,0.4)');
    }
    // 白色延迟扣除段 (displayHp > hp 时)
    const realFill = Math.round((barW - 2) * realRatio);
    if (fillW > realFill) {
      prect(barX + 1 + realFill, barY + 1, fillW - realFill, barH - 2, 'rgba(255,255,255,0.7)');
    }

    // 阴影
    const shadowW = Math.round(size * 0.9);
    const shadowH = Math.max(1, Math.round(4 * s));
    prect(cx - Math.floor(shadowW / 2), cy + half - 1, shadowW, shadowH, 'rgba(0,0,0,0.5)');

    // --- 角色精灵(浅黄色版) ---
    let facing = 'down';
    if (m.predictedPath && m.predictedPath.length > 0) {
      const last = m.predictedPath[m.predictedPath.length - 1];
      const ldx = last.toCol - last.fromCol, ldy = last.toRow - last.fromRow;
      if (ldy > 0) facing = 'down'; else if (ldy < 0) facing = 'up';
      else if (ldx > 0) facing = 'right'; else if (ldx < 0) facing = 'left';
    }
    const sx2 = m.hitFlash > 0 ? m.shakeX : 0;
    const sy2 = m.hitFlash > 0 ? m.shakeY : 0;
    drawCharacterAt(m.px + sx2, m.py + sy2, facing, 0, 0, 1);

    // 白闪覆盖 (受击瞬间)
    if (m.hitFlash > 0) {
      ctx.save();
      ctx.globalAlpha = m.hitFlash * 4;
      prect(cx - half, cy - half, size, size, '#ffffff');
      ctx.restore();
    }

    // 射击预览命中效果 (常驻显示, 所有预览阶段)
    if (turnState.phase === 'player_select' || turnState.phase === 'player_shoot_dir') {
      const hit = turnState.previewHits.find(h => h.monster.id === m.id);
      if (hit) {
        // 血条预伤害闪烁 (白色闪烁段)
        const previewW = Math.min(barW - 2, Math.round((barW - 2) * Math.min(1, hit.dmg / m.maxHp)));
        const flashA = 0.3 + 0.2 * Math.sin(monsterFlashTimer * 8);
        ctx.save();
        ctx.globalAlpha = flashA;
        prect(barX + 1 + Math.max(0, fillW - previewW), barY + 1, previewW, barH - 2, '#ffffff');
        ctx.restore();

        // 骷髅头 (致死判定) — 重新设计
        if (hit.lethal) {
          const skFlash = 0.35 + 0.25 * Math.sin(monsterFlashTimer * 6);
          ctx.save();
          ctx.globalAlpha = skFlash;
          const skX = cx - Math.round(10 * s), skY = cy - half - Math.round(18 * s);
          const S = Math.max(1, Math.round(1.5 * s));
          // 颅骨主体 (上宽下窄)
          prect(skX, skY, Math.round(20 * s), Math.round(18 * s), '#e8e8e0');
          prect(skX + S, skY + S, Math.round(18 * s), Math.round(16 * s), '#1a1a1a');
          // 颅骨顶部圆弧 (近似)
          prect(skX + Math.round(3 * s), skY - S, Math.round(14 * s), S, '#e8e8e0');
          // 颧骨 (两侧突出)
          prect(skX - S, skY + Math.round(10 * s), S * 2, Math.round(4 * s), '#e8e8e0');
          prect(skX + Math.round(18 * s), skY + Math.round(10 * s), S * 2, Math.round(4 * s), '#e8e8e0');
          // 眼洞 (大黑洞)
          prect(skX + Math.round(3 * s), skY + Math.round(4 * s), Math.round(5 * s), Math.round(4 * s), '#e8e8e0');
          prect(skX + Math.round(12 * s), skY + Math.round(4 * s), Math.round(5 * s), Math.round(4 * s), '#e8e8e0');
          // 鼻洞
          prect(skX + Math.round(9 * s), skY + Math.round(9 * s), Math.round(2 * s), Math.round(2 * s), '#e8e8e0');
          // 牙齿 (上排)
          for (let t = 0; t < 4; t++) {
            prect(skX + Math.round((3 + t * 4) * s), skY + Math.round(12 * s), Math.round(3 * s), Math.round(3 * s), '#e8e8e0');
          }
          // 下颌骨
          prect(skX + Math.round(4 * s), skY + Math.round(15 * s), Math.round(12 * s), Math.round(2 * s), '#ccc8c0');
          ctx.restore();
        }
      }
    }
  }
}

// --- 地面方格高亮辅助 ---
function drawGridOverlay(col, row, innerColor, innerAlpha, borderAlpha) {
  const xL = FLOOR_L + col * CELL, xR = FLOOR_L + (col + 1) * CELL;
  const yT = FLOOR_T + row * CELL, yB = FLOOR_T + (row + 1) * CELL;
  const tl = project(xL, yT), tr = project(xR, yT);
  const bl = project(xL, yB), br = project(xR, yB);
  ctx.save();
  ctx.globalAlpha = innerAlpha;
  ctx.fillStyle = innerColor;
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = borderAlpha;
  ctx.strokeStyle = innerColor;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// --- 怪物路径危险方格 (红色呼吸) ---
function drawMonsterDangerZones() {
  if (turnState.phase === 'monster_turn' || turnState.phase === 'player_execute') return;
  const breath = 0.15 + 0.1 * Math.sin(monsterFlashTimer * 5);
  for (const m of monsters) {
    if (!m.predictedPath) continue;
    for (const step of m.predictedPath) {
      drawGridOverlay(step.toCol, step.toRow, '#ff3333', breath * 1.5, breath * 0.8);
    }
  }
}

// --- 射击弹道方格 (蓝色呼吸) ---
function drawShootGridHighlights() {
  if (turnState.phase === 'player_execute' || turnState.phase === 'monster_turn') return;
  const breath = 0.12 + 0.08 * Math.sin(monsterFlashTimer * 5);
  // 队列中所有射击
  const previews = getShootPreviews();
  for (const pv of previews) traceBulletCells(pv.origin.col, pv.origin.row, pv.dir, breath);
  // 当前方向选择
  if (turnState.phase === 'player_shoot_dir' && turnState.pendingShootDir) {
    const ghost = calcGhostPos();
    traceBulletCells(ghost.col, ghost.row, turnState.pendingShootDir, breath);
  }
}
function traceBulletCells(originCol, originRow, dir, breath) {
  const vec = DIR_VEC[dir];
  let cx = originCol, cy = originRow;
  for (let step = 0; step < CFG.BULLET_MAX_DIST; step++) {
    cx += vec.dx; cy += vec.dy;
    if (isWall(cx, cy)) break;
    drawGridOverlay(cx, cy, '#4488ff', breath * 1.3, breath * 0.6);
    if (monsters.some(m => m.col === cx && m.row === cy)) break; // 命中怪物停止
  }
}

// 怪物路径预览 (红色闪烁箭头, 回合开始时计算)
function drawMonsterPaths() {
  // 怪物回合 / 执行阶段不显示箭头
  if (turnState.phase === 'monster_turn' || turnState.phase === 'player_execute') return;
  // 闪烁透明度
  const flash = 0.35 + 0.25 * Math.sin(monsterFlashTimer * 6);

  ctx.save();
  ctx.globalAlpha = flash;

  for (const m of monsters) {
    if (!m.predictedPath || m.predictedPath.length === 0) continue;

    for (const step of m.predictedPath) {
      const fromPx = gridToPixel(step.fromCol, step.fromRow);
      const toPx   = gridToPixel(step.toCol, step.toRow);
      const fp = project(fromPx.x, fromPx.y);
      const tp = project(toPx.x, toPx.y);
      const dx = tp.x - fp.x, dy = tp.y - fp.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 1) continue;
      const ux = dx / len, uy = dy / len;
      const s = fp.s;
      const thick = Math.max(2, Math.round(3.5 * s));
      const headLen = Math.max(5, Math.round(5.5 * s));

      const startX = fp.x + ux * (CELL * 0.18 * s);
      const endX   = tp.x - ux * headLen;
      const startY = fp.y + uy * (CELL * 0.18 * s);
      const endY   = tp.y - uy * headLen;

      // 光晕 (外圈淡色)
      for (let i = -Math.floor(thick / 2) - 1; i <= Math.floor(thick / 2) + 1; i++) {
        const px = uy * i, py = -ux * i;
        ctx.strokeStyle = 'rgba(255,40,40,0.3)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(Math.round(startX + px), Math.round(startY + py));
        ctx.lineTo(Math.round(endX + px), Math.round(endY + py));
        ctx.stroke();
      }

      // 主线 (粗红色实线)
      for (let i = -Math.floor(thick / 2); i <= Math.floor(thick / 2); i++) {
        const px = uy * i, py = -ux * i;
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.round(startX + px), Math.round(startY + py));
        ctx.lineTo(Math.round(endX + px), Math.round(endY + py));
        ctx.stroke();
      }

      // 箭头三角 (填充)
      ctx.fillStyle = '#ff3333';
      const tipX = tp.x - ux * (CELL * 0.06 * s);
      const tipY = tp.y - uy * (CELL * 0.06 * s);
      ctx.beginPath();
      ctx.moveTo(Math.round(tipX), Math.round(tipY));
      ctx.lineTo(Math.round(endX + uy * headLen * 0.5), Math.round(endY - ux * headLen * 0.5));
      ctx.lineTo(Math.round(endX - uy * headLen * 0.5), Math.round(endY + ux * headLen * 0.5));
      ctx.closePath();
      ctx.fill();
    }
  }

  ctx.restore();
}

// --- 可移动范围渲染 (浅蓝色呼吸闪烁) ---
function drawReachableOverlay() {
  if (turnState.phase !== 'player_select') return;
  const breath = 0.10 + 0.06 * Math.sin(monsterFlashTimer * 3.5);
  for (const key of turnState.reachableTiles) {
    const [col, row] = key.split(',').map(Number);
    // 跳过玩家当前位置 (由 drawGridHighlight 处理)
    if (col === player.col && row === player.row) continue;
    const xL = FLOOR_L + col * CELL, xR = FLOOR_L + (col + 1) * CELL;
    const yT = FLOOR_T + row * CELL, yB = FLOOR_T + (row + 1) * CELL;
    const tl = project(xL, yT), tr = project(xR, yT);
    const bl = project(xL, yB), br = project(xR, yB);

    ctx.save();
    ctx.globalAlpha = breath;
    ctx.fillStyle = '#55aadd';
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
    ctx.closePath(); ctx.fill();

    ctx.globalAlpha = breath * 0.7;
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

// --- 回合开始位置幽灵 (半透明提示) ---
function drawTurnStartGhost() {
  if (turnState.phase !== 'player_select') return;
  if (!turnSnapshot) return;
  if (turnSnapshot.playerCol === player.col && turnSnapshot.playerRow === player.row) return;
  const gp = gridToPixel(turnSnapshot.playerCol, turnSnapshot.playerRow);
  drawCharacterAt(gp.x, gp.y, turnSnapshot.playerFacing || 'down', 0, 0, CFG.GHOST_ALPHA);
}

// --- 调试渲染 ---
function drawDebugOverlay() {
  if (!debugMode) return;

  const STEP = 10; // 像素网格步长

  ctx.save();

  // --- 像素网格线 (淡色) ---
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (let x = STEP; x < GAME_W; x += STEP) {
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, GAME_H);
    ctx.stroke();
  }
  for (let y = STEP; y < GAME_H; y += STEP) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(GAME_W, y + 0.5);
    ctx.stroke();
  }

  // --- 坐标数字标注 (每 20px) ---
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '4px monospace';
  ctx.textBaseline = 'top';
  for (let x = 0; x < GAME_W; x += 20) {
    ctx.fillText(x, x + 1, 1);
  }
  for (let y = 20; y < GAME_H; y += 20) {
    ctx.fillText(y, 1, y + 1);
  }

  // --- 鼠标十字线 ---
  if (debugMouseIn && debugMouseX >= 0 && debugMouseX < GAME_W && debugMouseY >= 0 && debugMouseY < GAME_H) {
    const mx = Math.round(debugMouseX);
    const my = Math.round(debugMouseY);

    // 垂直虚线
    ctx.strokeStyle = 'rgba(255,200,80,0.55)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 2]);
    ctx.beginPath();
    ctx.moveTo(mx + 0.5, 0);
    ctx.lineTo(mx + 0.5, GAME_H);
    ctx.stroke();

    // 水平虚线
    ctx.beginPath();
    ctx.moveTo(0, my + 0.5);
    ctx.lineTo(GAME_W, my + 0.5);
    ctx.stroke();
    ctx.setLineDash([]);

    // 交叉点小方块
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(mx - 2, my - 2, 5, 5);
    ctx.fillStyle = '#ff6644';
    ctx.fillRect(mx - 1, my - 1, 3, 3);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(mx, my, 1, 1);
  }

  ctx.restore();
}

// ==================== 移动系统 ====================
function startMove(dir, speedOverride) {
  const spd = speedOverride || CFG.MOVE_SPEED;
  player.facing = dir;
  const vec = DIR_VEC[dir];
  const nc = player.col + vec.dx;
  const nr = player.row + vec.dy;
  if (isWall(nc, nr)) return false;
  player.col = nc;
  player.row = nr;
  const t = gridToPixel(nc, nr);
  player.targetPx = t.x;
  player.targetPy = t.y;
  player.animTime = 0;
  return true;
}

function updateMove(dt) {
  if (player.targetPx === null) return;
  const dx = player.targetPx - player.px;
  const dy = player.targetPy - player.py;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) {
    player.px = player.targetPx;
    player.py = player.targetPy;
    player.targetPx = null;
    player.targetPy = null;
    player.walkFrame = 0;
    player.animTime = 0;
    return true; // 移动完成
  }
  player.animTime += dt;
  const fd = SPRITE.maxFrame(SPRITE.getWalkDir(player.facing));
  player.walkFrame = Math.floor(player.animTime / SPRITE.ANIM_SPEED) % fd;
  const step = CFG.EXEC_MOVE_SPEED * dt;
  const r = Math.min(step / dist, 1);
  player.px += dx * r;
  player.py += dy * r;
  return false; // 移动中
}

// ==================== 子弹系统 ====================
function spawnBullet(dir, fromPx, fromPy) {
  const vec = DIR_VEC[dir];
  bullets.push({
    x: fromPx, y: fromPy,
    dirX: vec.dx, dirY: vec.dy,
    speed: CFG.BULLET_SPEED,
    distTraveled: 0,
    phase: 'flying',
    decayTimer: 0, vOff: 0, vVel: 0,
    maxDist: CFG.BULLET_MAX_DIST * CELL,
  });
  totalShots++;
}

function bulletHitMonster(bx, by) {
  const g = pixelToGrid(bx, by);
  for (const m of monsters) {
    if (m.col === g.col && m.row === g.row) return m;
  }
  return null;
}

function damageMonster(m, dmg) {
  m.hp = Math.max(0, m.hp - dmg);
  // 受击闪烁 + 抖动
  m.hitFlash = 0.12;
  m.shakeX = (Math.random() - 0.5) * 4;
  m.shakeY = (Math.random() - 0.5) * 3;

  // 伤害飘字 (黄色)
  damageNumbers.push({
    x: m.px, y: m.py - 5,
    text: '-' + dmg,
    life: 0.65, maxLife: 0.65,
    vy: -35 - Math.random() * 25,
    vx: (Math.random() - 0.5) * 20,
  });

  // 受击血雾粒子
  spawnBloodParticles(m.px, m.py, 3);

  if (m.hp <= 0) {
    // 死亡爆浆
    spawnBloodParticles(m.px, m.py, 18);
    const idx = monsters.indexOf(m);
    if (idx !== -1) monsters.splice(idx, 1);
  }
}

// 血雾粒子
function spawnBloodParticles(cx, cy, count) {
  for (let j = 0; j < count; j++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 80;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 20,
      life: 0.3 + Math.random() * 0.35,
      maxLife: 0.3 + Math.random() * 0.35,
      size: 1 + Math.random() * 2,
      color: Math.random() < 0.6 ? '#cc2222' : '#881111',
    });
  }
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.phase === 'flying') {
      const s = b.speed * dt;
      b.x += b.dirX * s; b.y += b.dirY * s;
      b.distTraveled += s;
      if (bulletHitWall(b.x, b.y)) { shatterBullet(b); continue; }
      // 子弹碰撞怪物
      const hitMon = bulletHitMonster(b.x, b.y);
      if (hitMon) { damageMonster(hitMon, playerStats.attack); shatterBullet(b); continue; }
      const decayDist = b.maxDist - CFG.DECAY_START_BEFORE * CELL;
      if (b.distTraveled >= decayDist) {
        b.phase = 'decaying'; b.speed = CFG.BULLET_SPEED * CFG.DECAY_SPEED_RATIO;
        b.vVel = 0; b.decayTimer = 0;
      }
    } else if (b.phase === 'decaying') {
      b.decayTimer += dt;
      const s = b.speed * dt;
      b.x += b.dirX * s; b.y += b.dirY * s;
      b.distTraveled += s;
      b.vVel += CFG.DECAY_GRAVITY * dt;
      b.vOff += b.vVel * dt;
      if (bulletHitWall(b.x, b.y)) { shatterBullet(b); continue; }
      // 下落阶段也可命中
      const hitMon = bulletHitMonster(b.x, b.y);
      if (hitMon) { damageMonster(hitMon, playerStats.attack); shatterBullet(b); continue; }
      if (b.distTraveled >= b.maxDist || b.vOff > CELL * 0.6) {
        if (b.distTraveled >= b.maxDist) b.distTraveled = b.maxDist;
        shatterBullet(b);
      }
    } else if (b.phase === 'dying') {
      b.shatterTimer -= dt;
      if (b.shatterTimer <= 0) bullets.splice(i, 1);
    }
  }
}

function shatterBullet(b) {
  b.phase = 'dying'; b.shatterTimer = CFG.SHATTER_DURATION;
  const n = CFG.SHATTER_PARTICLES;
  for (let j = 0; j < n; j++) {
    const angle = (Math.PI * 2 * j) / n + (Math.random() - 0.5) * 0.8;
    const spd = 30 + Math.random() * 60;
    particles.push({
      x: b.x, y: b.y + b.vOff,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 15,
      life: CFG.SHATTER_DURATION + Math.random() * 0.25,
      maxLife: CFG.SHATTER_DURATION + Math.random() * 0.25,
      size: 1, color: Math.random() < 0.5 ? '#ffdd88' : '#ff9944',
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += CFG.GRAVITY * 0.5 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}



// ==================== 空格执行系统 ====================
function startExecuteQueue() {
  if (turnState.actionQueue.length === 0) return;
  turnState.phase = 'player_execute';
  turnState.execIndex = 0;
  executeNextAction();
}

function executeNextAction() {
  if (turnState.execIndex >= turnState.actionQueue.length) return; // 等待游戏循环检测完成

  const act = turnState.actionQueue[turnState.execIndex];
  if (act.type === 'move') {
    player.facing = act.dir;
    const vec = DIR_VEC[act.dir];
    const nc = player.col + vec.dx, nr = player.row + vec.dy;
    if (isWall(nc, nr)) { turnState.execIndex++; return; }
    // 玩家→怪物碰撞
    const hitMon = monsters.find(m => m.col === nc && m.row === nr);
    if (hitMon && player.invincibleTurns <= 0) {
      damagePlayer(1);
      if (!tryPushMonster(hitMon, vec.dx, vec.dy)) {
        turnState.execIndex++;
        return;
      }
    }
    player.col = nc; player.row = nr;
    const t = gridToPixel(nc, nr);
    player.targetPx = t.x; player.targetPy = t.y;
    player.animTime = 0;
  } else if (act.type === 'shoot') {
    player.facing = act.dir;
    player.shootTimer = 0.4;
    spawnBullet(act.dir, player.px, player.py);
    turnState.execIndex++; // 射击即增量 → 等子弹特效结束后处理下一个
  }
}

// ==================== 回合结束确认弹窗 ====================
function showEndTurnConfirm() {
  turnState.phase = 'turn_end_confirm';
  const modal = document.getElementById('end-turn-modal');
  const msg = document.getElementById('end-turn-msg');
  const hasRemaining = turnState.mAP > 0 || turnState.aAP > 0;
  if (hasRemaining) {
    msg.innerHTML = '还有未使用点数<br><span style="color:#ffcc44;font-size:18px;">M-AP:' + turnState.mAP + ' A-AP:' + turnState.aAP + '</span><br>是否结束回合？';
  } else {
    msg.innerHTML = '是否结束回合？';
  }
  modal.classList.add('open');
}

function confirmEndTurn() {
  document.getElementById('end-turn-modal').classList.remove('open');
  bullets = [];
  particles = [];
  damageNumbers = [];
  turnState.phase = 'monster_turn';
  document.getElementById('action-bar').innerHTML = '<span class="action-bar-placeholder">-</span>';
  startMonsterTurn();
  updateUI();
}

function cancelEndTurn() {
  document.getElementById('end-turn-modal').classList.remove('open');
  turnState.phase = 'player_select';
  updateUI();
}

// ==================== 输入处理 ====================
document.addEventListener('keydown', (e) => {
  const actionKeys = ['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Escape','KeyC'];
  if (actionKeys.includes(e.code)) e.preventDefault();

  // ---- 阶段：回合结束确认弹窗 ----
  if (turnState.phase === 'turn_end_confirm') {
    if (e.code === 'Space') { confirmEndTurn(); }
    else if (e.code === 'Escape') { cancelEndTurn(); }
    return;
  }

  // ---- 阶段：怪物回合禁止操作 ----
  if (turnState.phase === 'monster_turn') return;

  // ---- 阶段：行为选择 ----
  if (turnState.phase === 'player_select') {
    switch (e.code) {
      case 'KeyW': case 'KeyS': case 'KeyA': case 'KeyD': {
        // === 移动本体 (距离公式, 可回原位返还AP) ===
        const dirMap = { KeyW: 'up', KeyS: 'down', KeyA: 'left', KeyD: 'right' };
        const dir = dirMap[e.code];
        if (!dir) return;

        const vec = DIR_VEC[dir];
        const nc = player.col + vec.dx;
        const nr = player.row + vec.dy;
        const key = `${nc},${nr}`;

        // 必须在初始可移动范围内 (BFS 已验证无墙无怪, 不实时刷新)
        if (!turnState.reachableTiles.has(key)) return;

        // 距离公式计算新 M-AP
        const newMAP = calculateMAPAt(nc, nr);
        if (newMAP < 0) return; // 超出距离上限

        // 移动本体
        player.facing = dir;
        player.col = nc;
        player.row = nr;
        const t = gridToPixel(nc, nr);
        player.targetPx = t.x;
        player.targetPy = t.y;
        player.animTime = 0;
        turnState.mAP = newMAP;

        // 移动时不刷新可移动范围浅蓝示意 (request 3)
        updateActionBar();
        updateUI();
        return;
      }

      case 'ArrowUp': case 'ArrowDown': case 'ArrowLeft': case 'ArrowRight': {
        // === 立即射击 ===
        if (turnState.aAP <= 0) return;
        const dirMap = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
        const dir = dirMap[e.code];
        if (!dir) return;

        // 立即射击
        player.facing = dir;
        player.shootTimer = 0.4;
        spawnBullet(dir, player.px, player.py);

        // 消耗 A-AP
        turnState.aAP--;

        // 首次射击: 保存 checkpoint, 从当前位置重新计算可移动范围
        if (!turnState.hasShot) {
          turnState.hasShot = true;
          checkpointPos = { col: player.col, row: player.row };
          // M-AP 用距离公式当前值; 可移动范围从 checkpoint 以剩余步数重新 BFS
          const remainingSteps = turnState.mAP;
          turnState.reachableTiles = calcReachableTiles(player.col, player.row, remainingSteps);
        }

        updateActionBar();
        updateUI();
        return;
      }

      case 'Space': {
        // 结束回合
        if (turnState.mAP > 0 || turnState.aAP > 0) {
          showEndTurnConfirm();
        } else {
          bullets = [];
          particles = [];
          damageNumbers = [];
          turnState.phase = 'monster_turn';
          document.getElementById('action-bar').innerHTML = '<span class="action-bar-placeholder">-</span>';
          startMonsterTurn();
          updateUI();
        }
        return;
      }

      case 'Escape': {
        // 全重置到回合开始
        if (turnSnapshot) {
          restoreTurnSnapshot();
          turnState.mAP = turnState.maxMAP;
          turnState.aAP = turnState.maxAAP;
          turnState.hasShot = false;
          checkpointPos = null;
          turnState.phase = 'player_select';
          turnState.reachableTiles = calcReachableTiles(player.col, player.row, turnState.mAP);
          saveTurnSnapshot();
          updateActionBar();
          updateUI();
        }
        return;
      }

      case 'KeyC': {
        spawnMonster();
        break;
      }
    }
    return;
  }
});

    btn.classList.remove('active');
    info.classList.remove('visible');
    debugMouseX = -1;
    debugMouseY = -1;
  }
});

// ==================== 游戏循环 ====================
let lastTime = performance.now();

function gameLoop(timestamp) {
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 0.1) dt = 0.1;

  // 更新移动动画 (本体移动)
  if (player.targetPx !== null) {
    updateMove(dt);
  }

  // 更新子弹 & 粒子
  updateBullets(dt);
  updateParticles(dt);

  // 射击表情倒计时
  player.shootTimer = Math.max(0, player.shootTimer - dt);
  // 玩家受击效果衰减
  if (player.hitFlash > 0) {
    player.hitFlash = Math.max(0, player.hitFlash - dt);
    player.shakeX *= 0.85; player.shakeY *= 0.85;
  }

  // 怪物平滑动画 (插值 px/py → 网格坐标)
  animateMonsters(dt);
  // 怪物受击效果衰减
  for (const m of monsters) {
    if (m.hitFlash > 0) m.hitFlash = Math.max(0, m.hitFlash - dt);
  }

  // 怪物回合执行
  if (turnState.phase === 'monster_turn') {
    updateMonsterTurn(dt);
  }

  // 闪烁计时器 (可移动范围 / 怪物路径)
  if (turnState.phase === 'player_select') {
    monsterFlashTimer += dt;
  }

  // 伤害飘字更新
  updateDamageNumbers(dt);

  render();
  requestAnimationFrame(gameLoop);
}

// ==================== 启动 ====================
const startPos = gridToPixel(player.col, player.row);
player.px = startPos.x;
player.py = startPos.y;
resetTurnAP();
buildHearts(playerStats.maxHp);
buildApDots('ui-aap-dots', turnState.maxAAP);
buildApDots('ui-map-dots', turnState.maxMAP);
updateUI();
lastTime = performance.now();
requestAnimationFrame(gameLoop);

// ==================== 生怪 ====================
function spawnMonster() {
  const occupied = new Set();
  occupied.add(`${player.col},${player.row}`);
  for (const m of monsters) occupied.add(`${m.col},${m.row}`);
  const candidates = [];
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++)
      if (!occupied.has(`${c},${r}`)) candidates.push({ col: c, row: r });
  if (candidates.length === 0) return;
  const pos = candidates[Math.floor(Math.random() * candidates.length)];
  const pix = gridToPixel(pos.col, pos.row);
  monsters.push({
    id: ++monsterIdCounter, name: MONSTER_CFG.name,
    col: pos.col, row: pos.row,
    px: pix.x, py: pix.y,
    hp: MONSTER_CFG.hp, maxHp: MONSTER_CFG.hp,
    displayHp: MONSTER_CFG.hp,
    predictedPath: [], moveSpeed: 2,
    hitFlash: 0, shakeX: 0, shakeY: 0,
  });
  calcAllMonsterPaths();
}
document.getElementById('spawn-monster-btn').addEventListener('click', spawnMonster);
